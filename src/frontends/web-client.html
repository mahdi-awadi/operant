<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Hub</title>
  <!-- Markdown renderer + sanitizer for chat bubbles -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Dark (default) — same palette as before */
      --bg: #1a1a2e;
      --sidebar: #16213e;
      --border: #0f3460;
      --accent: #e94560;
      --text: #e0e0e0;
      --text-muted: #888;
      --user-bubble: #1a3a6e;
      --claude-bubble: #1e1e3a;
      --input-bg: #0d0d1a;
    }

    /* Light — white canvas, dark text, muted accents */
    body[data-theme="light"] {
      --bg: #fafafa;
      --sidebar: #f0f2f5;
      --border: #dcdfe4;
      --accent: #2563eb;
      --text: #1f2328;
      --text-muted: #6b7280;
      --user-bubble: #dbeafe;
      --claude-bubble: #f3f4f6;
      --input-bg: #ffffff;
    }

    /* Blue — deep, saturated ocean */
    body[data-theme="blue"] {
      --bg: #0b1b2c;
      --sidebar: #12263b;
      --border: #1e3a5f;
      --accent: #38bdf8;
      --text: #e6f2ff;
      --text-muted: #7aa3c9;
      --user-bubble: #1e3a5f;
      --claude-bubble: #13273c;
      --input-bg: #08142a;
    }

    /* Smooth — soft pastel, low contrast, calm */
    body[data-theme="smooth"] {
      --bg: #2a2433;
      --sidebar: #322b3d;
      --border: #443a55;
      --accent: #b794f4;
      --text: #ede6f4;
      --text-muted: #a89ab0;
      --user-bubble: #3d3449;
      --claude-bubble: #33293f;
      --input-bg: #231d2c;
    }

    /* Solarized — classic warm palette */
    body[data-theme="solarized"] {
      --bg: #002b36;
      --sidebar: #073642;
      --border: #586e75;
      --accent: #b58900;
      --text: #fdf6e3;
      --text-muted: #93a1a1;
      --user-bubble: #094352;
      --claude-bubble: #073642;
      --input-bg: #001e26;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width 0.2s;
    }

    #sidebar-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #hub-title {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--accent);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Unified icon button — used for spawn, theme, kebab, row actions */
    .icon-btn {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      flex-shrink: 0;
      padding: 0;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); border-color: var(--text-muted); }
    .icon-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .icon-btn.primary:hover { opacity: 0.88; }
    .icon-btn.danger:hover { color: #f87171; border-color: #f87171; }

    /* Light theme wants a subtler hover */
    body[data-theme="light"] .icon-btn:hover { background: rgba(0,0,0,0.05); }

    #spawn-btn { /* legacy id kept — styling now via .icon-btn */ }

    #sidebar-footer {
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }
    #sidebar-footer button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      padding: 4px 6px;
      border-radius: 4px;
    }
    #sidebar-footer button:hover { background: rgba(255,255,255,0.05); color: var(--text); }

    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    /* Folder group header — small muted label above sessions in a folder */
    .group-header {
      padding: 10px 14px 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.75;
    }

    .session-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
      position: relative;
      min-height: 36px;
    }
    .session-item:hover { background: rgba(255,255,255,0.04); }
    body[data-theme="light"] .session-item:hover { background: rgba(0,0,0,0.04); }
    .session-item.active {
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      border-left-color: var(--accent);
    }
    .session-item.teammate { padding-left: 30px; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.active { background: #4caf50; }
    .status-dot.disconnected { background: #f44336; }
    .status-dot.respawning { background: #ff9800; }

    .session-name {
      flex: 1;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Kebab button reveals on hover or when menu is open */
    .kebab-btn {
      width: 24px;
      height: 24px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;       /* don't eat clicks while invisible */
      transition: opacity 0.1s, background 0.1s;
      flex-shrink: 0;
      font-size: 16px;
      line-height: 1;
      padding: 0;
    }
    .session-item:hover .kebab-btn,
    .session-item.menu-open .kebab-btn {
      opacity: 1;
      pointer-events: auto;       /* clickable only when visible */
    }
    .kebab-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    body[data-theme="light"] .kebab-btn:hover { background: rgba(0,0,0,0.08); }

    /* Kebab popover menu */
    .kebab-menu {
      position: absolute;
      top: 100%;
      right: 8px;
      margin-top: 2px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      z-index: 50;
      min-width: 220px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    body[data-theme="light"] .kebab-menu { box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

    .kebab-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      font-size: 12px;
      color: var(--text);
      border-radius: 5px;
      cursor: pointer;
      background: none;
      border: none;
      text-align: left;
      width: 100%;
    }
    .kebab-item:hover { background: rgba(255,255,255,0.06); }
    body[data-theme="light"] .kebab-item:hover { background: rgba(0,0,0,0.06); }
    .kebab-item.danger { color: #f87171; }
    .kebab-sep {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }
    .kebab-label {
      font-size: 10px;
      color: var(--text-muted);
      padding: 4px 10px 2px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .kebab-segmented {
      display: flex;
      gap: 4px;
      padding: 4px 10px 6px;
    }
    .kebab-seg {
      flex: 1;
      padding: 4px 6px;
      font-size: 11px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 4px;
      cursor: pointer;
    }
    .kebab-seg[aria-pressed="true"] {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .kebab-seg:hover { border-color: var(--text-muted); }

    .badge {
      background: var(--accent);
      color: white;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 11px;
      min-width: 18px;
      text-align: center;
    }

    /* Main area */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--sidebar);
    }

    #session-title {
      font-weight: 600;
      font-size: 15px;
    }

    .trust-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      background: var(--border);
      color: var(--text-muted);
    }
    .trust-badge.auto { background: #1a3a1a; color: #4caf50; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }
    .msg-row.user { align-self: flex-end; align-items: flex-end; }
    .msg-row.claude { align-self: flex-start; align-items: flex-start; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; opacity: 0.75; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    /* User bubbles stay plain-text; claude bubbles get full markdown rendering */
    .msg-row.user .msg-bubble { background: var(--user-bubble); border-radius: 12px 12px 2px 12px; white-space: pre-wrap; }
    .msg-row.claude .msg-bubble { background: var(--claude-bubble); border: 1px solid var(--border); border-radius: 12px 12px 12px 2px; }
    .msg-row.other .msg-bubble { background: var(--claude-bubble); border: 1px solid var(--border); font-style: italic; border-radius: 12px 12px 12px 2px; }

    /* ─── Markdown rendering inside Claude's bubble ─── */
    .msg-bubble.md > *:first-child { margin-top: 0; }
    .msg-bubble.md > *:last-child { margin-bottom: 0; }
    .msg-bubble.md p { margin: 0.5em 0; }

    /* Headings */
    .msg-bubble.md h1,
    .msg-bubble.md h2,
    .msg-bubble.md h3,
    .msg-bubble.md h4,
    .msg-bubble.md h5,
    .msg-bubble.md h6 {
      font-weight: 700;
      line-height: 1.25;
      margin: 0.9em 0 0.4em;
      color: var(--text);
    }
    .msg-bubble.md h1 { font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
    .msg-bubble.md h2 { font-size: 1.25em; border-bottom: 1px solid var(--border); padding-bottom: 0.15em; }
    .msg-bubble.md h3 { font-size: 1.12em; }
    .msg-bubble.md h4 { font-size: 1.02em; }
    .msg-bubble.md h5,
    .msg-bubble.md h6 { font-size: 1em; color: var(--text-muted); }

    /* Inline code & code blocks */
    .msg-bubble.md code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.88em;
      background: rgba(0,0,0,0.35);
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    body[data-theme="light"] .msg-bubble.md code { background: rgba(0,0,0,0.05); }
    .msg-bubble.md pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin: 0.6em 0;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.45;
    }
    body[data-theme="light"] .msg-bubble.md pre { background: rgba(0,0,0,0.04); }
    .msg-bubble.md pre code {
      background: transparent;
      border: none;
      padding: 0;
      font-size: inherit;
    }

    /* Lists */
    .msg-bubble.md ul,
    .msg-bubble.md ol {
      margin: 0.4em 0;
      padding-left: 1.4em;
    }
    .msg-bubble.md li { margin: 0.2em 0; }
    .msg-bubble.md li > p { margin: 0; }
    .msg-bubble.md li > ul,
    .msg-bubble.md li > ol { margin: 0.2em 0; }

    /* Tables — the big win */
    .msg-bubble.md {
      /* Allow tables to scroll horizontally inside the bubble instead of overflowing */
      overflow-x: auto;
    }
    .msg-bubble.md table {
      border-collapse: collapse;
      margin: 0.6em 0;
      font-size: 0.92em;
      max-width: 100%;
    }
    .msg-bubble.md th,
    .msg-bubble.md td {
      border: 1px solid var(--border);
      padding: 5px 10px;
      text-align: left;
      vertical-align: top;
    }
    .msg-bubble.md th {
      background: rgba(255,255,255,0.04);
      font-weight: 600;
    }
    body[data-theme="light"] .msg-bubble.md th { background: rgba(0,0,0,0.04); }
    .msg-bubble.md tbody tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    body[data-theme="light"] .msg-bubble.md tbody tr:nth-child(even) td { background: rgba(0,0,0,0.02); }

    /* Blockquotes */
    .msg-bubble.md blockquote {
      margin: 0.5em 0;
      padding: 4px 12px;
      border-left: 3px solid var(--accent);
      color: var(--text-muted);
      background: rgba(255,255,255,0.02);
      border-radius: 0 4px 4px 0;
    }
    body[data-theme="light"] .msg-bubble.md blockquote { background: rgba(0,0,0,0.03); }
    .msg-bubble.md blockquote > *:first-child { margin-top: 0; }
    .msg-bubble.md blockquote > *:last-child { margin-bottom: 0; }

    /* Horizontal rule */
    .msg-bubble.md hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1em 0;
    }

    /* Links */
    .msg-bubble.md a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .msg-bubble.md a:hover { opacity: 0.85; }

    /* Inline emphasis */
    .msg-bubble.md strong { font-weight: 700; }
    .msg-bubble.md em { font-style: italic; }
    .msg-bubble.md del { opacity: 0.6; }

    .msg-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin: 2px 4px;
    }

    .session-tag {
      display: inline-block;
      background: var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      margin-bottom: 3px;
      color: var(--text-muted);
    }

    /* Permission card */
    .perm-card {
      background: #1a2a1a;
      border: 1px solid #2a5a2a;
      border-radius: 10px;
      padding: 12px 14px;
      max-width: 420px;
      align-self: flex-start;
    }
    .perm-card h4 { color: #ff9800; font-size: 13px; margin-bottom: 6px; }
    .perm-card .perm-detail { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .perm-card code { background: rgba(0,0,0,0.3); padding: 1px 4px; border-radius: 3px; font-size: 11px; }
    .perm-actions { display: flex; gap: 8px; margin-top: 10px; }
    .perm-allow { background: #2a5a2a; color: #4caf50; border: 1px solid #4caf50; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .perm-allow:hover { background: #3a7a3a; }
    .perm-deny { background: #4a1a1a; color: #f44336; border: 1px solid #f44336; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .perm-deny:hover { background: #6a2a2a; }

    /* Input area */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      background: var(--input-bg);
    }

    #msg-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      resize: none;
      min-height: 42px;
      max-height: 120px;
    }
    #msg-input:focus { outline: none; border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    /* Drop overlay */
    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(233,69,96,0.15);
      border: 3px dashed var(--accent);
      z-index: 100;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      color: var(--accent);
    }
    body.dragging #drop-overlay { display: flex; }

    /* No session */
    #no-session {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Restart popover */
    .restart-popover {
      position: absolute;
      z-index: 150;
      background: var(--sidebar);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      min-width: 280px;
      max-width: 360px;
      padding: 6px 0;
      font-size: 12px;
    }
    .restart-popover .rp-section {
      padding: 6px 12px;
      color: var(--text-muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .restart-popover .rp-item {
      padding: 8px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }
    .restart-popover .rp-item:hover,
    .restart-popover .rp-item.focused { background: rgba(255,255,255,0.06); }
    .restart-popover .rp-item.disabled { opacity: 0.4; cursor: default; }
    .restart-popover .rp-preview {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .restart-popover .rp-time {
      color: var(--text-muted);
      font-size: 11px;
      flex-shrink: 0;
    }
    .restart-popover hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }

    /* Autopilot badge — shown next to session name when enabled */
    .ap-badge { font-size: 13px; flex-shrink: 0; }

    /* Autopilot veto card */
    #autopilot-veto-card {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #1a2a3a;
      border: 1px solid #2a5a8a;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      max-width: 520px;
      align-self: flex-start;
    }
    #autopilot-veto-card h4 {
      color: #4acfcf;
      font-size: 13px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #autopilot-veto-countdown {
      font-size: 11px;
      color: var(--text-muted);
    }
    #autopilot-veto-draft {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 12px;
      resize: vertical;
      min-height: 60px;
      margin-bottom: 8px;
      font-family: inherit;
    }
    #autopilot-veto-draft:focus { outline: none; border-color: #4acfcf; }
    .veto-actions { display: flex; gap: 8px; }
    .veto-send { background: #1a4a3a; color: #4acf90; border: 1px solid #4acf90; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .veto-send:hover { background: #2a6a5a; }
    .veto-edit { background: #1a3a4a; color: #4a9eff; border: 1px solid #4a9eff; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .veto-edit:hover { background: #2a5a6a; }
    .veto-cancel { background: #4a1a1a; color: #f44336; border: 1px solid #f44336; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .veto-cancel:hover { background: #6a2a2a; }

    /* Autopilot escalation card — amber colorway to distinguish from the draft */
    .autopilot-escalate-card {
      position: sticky;
      top: 0;
      z-index: 51;
      background: #3a2a12;
      border: 1px solid #8a5a12;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      max-width: 560px;
      align-self: flex-start;
    }
    .autopilot-escalate-card h4 {
      color: #fbbf24;
      font-size: 13px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .autopilot-escalate-card .esc-reason {
      color: #fcd34d;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .autopilot-escalate-card .esc-question {
      background: rgba(0,0,0,0.3);
      border-left: 3px solid #fbbf24;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text);
      max-height: 240px;
      overflow-y: auto;
      white-space: pre-wrap;
      border-radius: 0 6px 6px 0;
      margin-bottom: 8px;
    }
    .autopilot-escalate-card .esc-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .autopilot-escalate-card .esc-actions button {
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid;
      background: transparent;
    }
    .autopilot-escalate-card .esc-proceed { color: #fbbf24; border-color: #fbbf24; }
    .autopilot-escalate-card .esc-proceed:hover { background: rgba(251,191,36,0.12); }
    .autopilot-escalate-card .esc-answer { color: #4a9eff; border-color: #4a9eff; }
    .autopilot-escalate-card .esc-answer:hover { background: rgba(74,158,255,0.12); }
    .autopilot-escalate-card .esc-dismiss { color: var(--text-muted); border-color: var(--border); }
    .autopilot-escalate-card .esc-dismiss:hover { background: rgba(255,255,255,0.05); }
    .autopilot-escalate-card textarea.esc-reply-input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 12px;
      resize: vertical;
      min-height: 60px;
      margin: 8px 0;
      font-family: inherit;
    }
    .autopilot-escalate-card textarea.esc-reply-input:focus { outline: none; border-color: #4a9eff; }
    body[data-theme="light"] .autopilot-escalate-card { background: #fef3c7; border-color: #d97706; }
    body[data-theme="light"] .autopilot-escalate-card h4 { color: #92400e; }
    body[data-theme="light"] .autopilot-escalate-card .esc-reason { color: #78350f; }
    body[data-theme="light"] .autopilot-escalate-card .esc-question { background: rgba(0,0,0,0.06); border-left-color: #d97706; }

    /* Mobile */
    @media (max-width: 768px) {
      #sidebar {
        width: 56px;
        min-width: 56px;
      }
      #sidebar-header { padding: 10px 6px; justify-content: center; flex-wrap: wrap; gap: 4px; }
      #hub-title { display: none; }
      #theme-btn { display: none; }
      #sidebar-footer { padding: 6px; justify-content: center; }
      #sidebar-footer #footer-user { display: none; }
      .group-header { display: none; }
      .session-name { display: none; }
      .session-item { justify-content: center; padding: 12px 4px; gap: 4px; }
      .session-item.teammate { padding-left: 4px; }
      .badge { display: none; }
      .kebab-btn { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="drop-overlay">Drop file to upload</div>

  <div id="login-screen" style="display:none; position:fixed; inset:0; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; gap:24px; z-index:200;">
    <div style="font-size:24px; font-weight:700; color:var(--accent);">Claude Code Hub</div>
    <div style="color:var(--text-muted); font-size:14px;">Sign in with Telegram to continue</div>
    <div id="telegram-widget-container"></div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">
      <span id="hub-title">Claude Code Hub</span>
      <button id="spawn-btn" class="icon-btn primary" title="Spawn a new session" onclick="promptSpawn()">+</button>
      <button id="theme-btn" class="icon-btn" title="Cycle theme (dark)" onclick="cycleTheme()">🎨</button>
    </div>
    <div id="session-list"></div>
    <div id="sidebar-footer">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="footer-user">signed in</span>
      <button onclick="logout()" title="Sign out">Logout</button>
    </div>
  </div>

  <div id="main">
    <div id="header">
      <span id="session-title" style="color: var(--text-muted)">No session selected</span>
      <span id="trust-badge" class="trust-badge" style="display:none"></span>
      <code id="tmux-cmd" style="display:none; margin-left:auto; font-size:11px; color:var(--text-muted); background:rgba(0,0,0,0.3); padding:3px 8px; border-radius:4px; cursor:pointer;" title="Click to copy" onclick="copyTmuxCmd()"></code>
    </div>
    <div id="messages">
      <div id="no-session" style="color: var(--text-muted); margin: auto; opacity: 0.5;">Select a session to start chatting</div>
    </div>
    <div id="compose-area" style="display:none;">
      <div id="prompt-tags" style="border-top:1px solid var(--border);padding:6px 16px;display:flex;flex-wrap:wrap;gap:6px;background:var(--input-bg);"></div>
      <div id="attached-files" style="padding:0 16px;display:none;flex-wrap:wrap;gap:6px;background:var(--input-bg);"></div>
      <div id="input-area">
        <label style="cursor:pointer;display:flex;align-items:center;color:var(--text-muted);font-size:18px;padding:0 4px;" title="Attach file">
          <input type="file" id="file-input" multiple style="display:none;" onchange="handleFileSelect(this)" />
          📎
        </label>
        <textarea id="msg-input" placeholder="Type a message..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="sendMsg()">Send</button>
      </div>
    </div>
  </div>

  <script>
    // Themes — cycle via the 🎨 button in the sidebar header; persists in localStorage
    const THEMES = ['dark', 'light', 'blue', 'smooth', 'solarized']
    function applyTheme(name) {
      if (!THEMES.includes(name)) name = 'dark'
      if (name === 'dark') {
        document.body.removeAttribute('data-theme')
      } else {
        document.body.setAttribute('data-theme', name)
      }
      const btn = document.getElementById('theme-btn')
      if (btn) btn.title = `Cycle theme (${name})`
      localStorage.setItem('hub_theme', name)
    }
    function cycleTheme() {
      const cur = localStorage.getItem('hub_theme') || 'dark'
      const next = THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length]
      applyTheme(next)
    }
    // Apply saved theme immediately so first paint matches
    applyTheme(localStorage.getItem('hub_theme') || 'dark')

    // Prompt tags — toggleable instructions appended to messages
    const defaultTags = [
      { id: 'superpowers', label: 'Use Superpowers Skills', text: 'use superpowers skills', active: false },
      { id: 'tdd', label: 'TDD', text: 'follow TDD workflow', active: false },
      { id: 'concise', label: 'Be Concise', text: 'be concise and direct', active: false },
      { id: 'nocommit', label: 'No Commit', text: 'do not commit changes', active: false },
      { id: 'planfirst', label: 'Plan First', text: 'create a plan before implementing', active: false },
      { id: 'review', label: 'Review Code', text: 'review the code for issues', active: false },
    ]

    function loadTags() {
      const saved = localStorage.getItem('hub_tags')
      if (saved) {
        try {
          const states = JSON.parse(saved)
          for (const tag of defaultTags) {
            if (states[tag.id] !== undefined) tag.active = states[tag.id]
          }
        } catch {}
      }
    }

    function saveTags() {
      const states = {}
      for (const tag of defaultTags) states[tag.id] = tag.active
      localStorage.setItem('hub_tags', JSON.stringify(states))
    }

    function renderTags() {
      const container = document.getElementById('prompt-tags')
      container.innerHTML = ''
      for (const tag of defaultTags) {
        const el = document.createElement('button')
        el.textContent = tag.label
        el.style.cssText = `
          padding:3px 10px; border-radius:12px; font-size:11px; cursor:pointer; transition:all 0.15s;
          border:1px solid ${tag.active ? 'var(--accent)' : 'var(--border)'};
          background:${tag.active ? 'rgba(233,69,96,0.15)' : 'transparent'};
          color:${tag.active ? 'var(--accent)' : 'var(--text-muted)'};
        `
        el.onclick = () => {
          tag.active = !tag.active
          saveTags()
          renderTags()
        }
        container.appendChild(el)
      }
    }

    function getActiveTagsText() {
      const active = defaultTags.filter(t => t.active).map(t => t.text)
      return active.length > 0 ? '\n\n[Instructions: ' + active.join(', ') + ']' : ''
    }

    loadTags()
    renderTags()

    // State
    let ws = null
    let activeSession = null
    let sessions = []
    let messagesBySession = {}
    let unreadBySession = {}
    let currentTasks = {} // folder path → AgentTask[]

    // Escape HTML for XSS prevention
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
    }

    // Markdown → sanitized HTML for chat bubbles. Falls back to escaped
    // text + <br> if the CDN libs failed to load (offline / blocked).
    function renderMarkdown(text) {
      if (!text) return ''
      try {
        if (window.marked && window.DOMPurify) {
          const html = window.marked.parse(text, {
            breaks: true,    // single \n → <br> (matches chat expectations)
            gfm: true,       // tables, autolinks, strikethrough
          })
          return window.DOMPurify.sanitize(html, { ADD_ATTR: ['target', 'rel'] })
        }
      } catch (err) {
        console.warn('markdown render failed, falling back to plaintext', err)
      }
      return escapeHtml(text).replace(/\n/g, '<br>')
    }

    // WebSocket
    function connectWs() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:'
      ws = new WebSocket(`${protocol}//${location.host}/ws`)

      ws.onopen = () => {
        console.log('WS connected')
      }

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data)
          handleWsMessage(msg)
        } catch (e) {
          console.error('WS parse error', e)
        }
      }

      ws.onclose = () => {
        console.log('WS closed, reconnecting...')
        setTimeout(connectWs, 2000)
      }

      ws.onerror = (err) => {
        console.error('WS error', err)
      }
    }

    function handleWsMessage(msg) {
      if (msg.type === 'sessions') {
        sessions = msg.data
        renderSidebar()
      } else if (msg.type === 'message') {
        const { sessionName, text, files } = msg
        if (!messagesBySession[sessionName]) messagesBySession[sessionName] = []
        messagesBySession[sessionName].push({ role: 'claude', text, files, ts: Date.now() })

        if (sessionName === activeSession) {
          appendMessage({ role: 'claude', text, files }, false)
        } else {
          // Badge + append with tag
          unreadBySession[sessionName] = (unreadBySession[sessionName] || 0) + 1
          renderSidebar()
          if (activeSession) {
            appendMessage({ role: 'claude', text, files, fromSession: sessionName }, true)
          }
        }
      } else if (msg.type === 'permission') {
        showPermissionCard(msg)
      } else if (msg.type === 'tasks') {
        currentTasks = msg.data
        renderSidebar()
      } else if (msg.type === 'autopilot:draft') {
        showAutopilotVetoCard(msg)
      } else if (msg.type === 'autopilot:escalate') {
        showAutopilotEscalationCard(msg)
      }
    }

    // Autopilot escalation card — appears when autopilot bounces a question
    // (risk keyword / ESCALATE token / timeout / parse error). Offers three
    // one-click actions so the user doesn't have to scroll to find Claude's
    // question or retype anything.
    function showAutopilotEscalationCard(msg) {
      // Remove any existing card for this session (one at a time per session)
      document.querySelectorAll('.autopilot-escalate-card[data-name="' + CSS.escape(msg.sessionName) + '"]').forEach(el => el.remove())

      const area = document.getElementById('messages')
      const card = document.createElement('div')
      card.className = 'autopilot-escalate-card'
      card.dataset.name = msg.sessionName
      card.onclick = (e) => e.stopPropagation()

      const canProceed = msg.reasonKind === 'risk'  // "proceed anyway" only meaningful for risk escalations
      const proceedBtn = canProceed
        ? `<button class="esc-proceed" data-action="proceed">⚡ Let autopilot answer anyway</button>`
        : `<button class="esc-proceed" data-action="retry">🔄 Retry autopilot</button>`

      card.innerHTML = `
        <h4>🟡 Autopilot bounced — <span style="font-weight:400">${escapeHtml(msg.sessionName)}</span></h4>
        <div class="esc-reason">${escapeHtml(msg.reason)}</div>
        <div class="esc-question">${escapeHtml(msg.rawQuestion)}</div>
        <div class="esc-actions">
          ${proceedBtn}
          <button class="esc-answer" data-action="answer-toggle">✍️ I'll answer</button>
          <button class="esc-dismiss" data-action="dismiss">❌ Dismiss</button>
        </div>
        <div class="esc-reply" style="display:none;">
          <textarea class="esc-reply-input" placeholder="Type your answer..."></textarea>
          <div class="esc-actions">
            <button class="esc-answer" data-action="answer-send">Send</button>
            <button class="esc-dismiss" data-action="answer-cancel">Cancel</button>
          </div>
        </div>
      `

      card.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', async (ev) => {
          ev.stopPropagation()
          const action = btn.dataset.action
          if (action === 'answer-toggle') {
            const reply = card.querySelector('.esc-reply')
            reply.style.display = ''
            reply.querySelector('textarea').focus()
            return
          }
          if (action === 'answer-cancel') {
            const reply = card.querySelector('.esc-reply')
            reply.style.display = 'none'
            reply.querySelector('textarea').value = ''
            return
          }
          if (action === 'answer-send') {
            const txt = card.querySelector('textarea').value.trim()
            if (!txt) return
            await fetch('/api/autopilot/escalate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: msg.sessionName, action: 'answer', text: txt }),
            })
            card.remove()
            return
          }
          if (action === 'dismiss') {
            await fetch('/api/autopilot/escalate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: msg.sessionName, action: 'dismiss' }),
            })
            card.remove()
            return
          }
          if (action === 'proceed' || action === 'retry') {
            await fetch('/api/autopilot/escalate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: msg.sessionName, action: 'proceed' }),
            })
            card.remove()
            return
          }
        })
      })

      area.insertBefore(card, area.firstChild)
    }

    // Autopilot veto card state
    let _vetoTimer = null
    let _vetoData = null

    function showAutopilotVetoCard(msg) {
      // Remove any existing card
      dismissVetoCard()

      _vetoData = msg

      const area = document.getElementById('messages')
      const card = document.createElement('div')
      card.id = 'autopilot-veto-card'

      const secondsLeft = () => Math.max(0, Math.round((msg.expiresAt - Date.now()) / 1000))

      card.innerHTML = `
        <h4>🤖 Autopilot draft — <span style="font-weight:400">${escapeHtml(msg.sessionName)}</span>
          <span id="autopilot-veto-countdown" style="font-size:11px;color:var(--text-muted);margin-left:auto;">(${secondsLeft()}s)</span>
        </h4>
        <textarea id="autopilot-veto-draft">${escapeHtml(msg.draft)}</textarea>
        <div class="veto-actions">
          <button class="veto-send" onclick="submitVeto('${escapeHtml(msg.sessionName)}','send')">✅ Send</button>
          <button class="veto-edit" onclick="submitVeto('${escapeHtml(msg.sessionName)}','edit')">✏️ Edit &amp; send</button>
          <button class="veto-cancel" onclick="submitVeto('${escapeHtml(msg.sessionName)}','cancel')">❌ Cancel</button>
        </div>
      `

      area.insertBefore(card, area.firstChild)

      // Countdown ticker
      _vetoTimer = setInterval(() => {
        const s = secondsLeft()
        const el = document.getElementById('autopilot-veto-countdown')
        if (el) el.textContent = `(${s}s)`
        if (s <= 0) {
          // Server already fired; just clean up the card
          dismissVetoCard()
        }
      }, 1000)
    }

    function dismissVetoCard() {
      if (_vetoTimer) { clearInterval(_vetoTimer); _vetoTimer = null }
      _vetoData = null
      const existing = document.getElementById('autopilot-veto-card')
      if (existing) existing.remove()
    }

    async function submitVeto(sessionName, action) {
      const textarea = document.getElementById('autopilot-veto-draft')
      const edited = textarea ? textarea.value : ''
      dismissVetoCard()
      try {
        await fetch('/api/autopilot/veto', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: sessionName, action, edited }),
        })
      } catch (err) {
        console.error('Veto action failed', err)
      }
    }

    // Sidebar — clean row layout, all per-session actions behind a kebab menu
    function renderSidebar() {
      const list = document.getElementById('session-list')
      list.innerHTML = ''

      // Group sessions by folder path (strip :index suffix)
      const groups = new Map()
      for (const s of sessions) {
        const folder = s.path ? s.path.replace(/:\d+$/, '') : s.name
        if (!groups.has(folder)) groups.set(folder, [])
        groups.get(folder).push(s)
      }

      for (const [folder, members] of groups) {
        members.sort((a, b) => (a.teamIndex ?? 0) - (b.teamIndex ?? 0))
        const isTeam = members.length > 1

        // Group header — show the folder name above each group so users can
        // scan at a glance. Use the basename for brevity; full path in title.
        const groupHeader = document.createElement('div')
        groupHeader.className = 'group-header'
        groupHeader.title = folder
        const short = folder.split('/').filter(Boolean).pop() || folder
        groupHeader.textContent = short
        list.appendChild(groupHeader)

        for (const s of members) {
          const isLead = !isTeam || (s.teamIndex ?? 0) === 0
          const item = document.createElement('div')
          item.className = 'session-item' + (s.name === activeSession ? ' active' : '') + (isLead ? '' : ' teammate')
          item.onclick = () => selectSession(s.name)

          const dot = document.createElement('div')
          dot.className = `status-dot ${s.status}`

          const name = document.createElement('div')
          name.className = 'session-name'
          name.textContent = s.name

          item.appendChild(dot)
          item.appendChild(name)

          if (s.autopilot?.enabled) {
            const apBadge = document.createElement('span')
            apBadge.className = 'ap-badge'
            apBadge.title = 'Autopilot on'
            apBadge.textContent = '🤖'
            item.appendChild(apBadge)
          }

          const unread = unreadBySession[s.name]
          if (unread && s.name !== activeSession) {
            const badge = document.createElement('div')
            badge.className = 'badge'
            badge.textContent = unread > 99 ? '99+' : String(unread)
            item.appendChild(badge)
          }

          // Single kebab button — reveals on hover, opens a popover with all
          // per-session actions (trust, autopilot, add teammate, close/restart/remove).
          const kebab = document.createElement('button')
          kebab.className = 'kebab-btn'
          kebab.title = 'Session actions'
          kebab.textContent = '⋮'
          kebab.onclick = (e) => { e.stopPropagation(); openSessionMenu(item, s) }
          item.appendChild(kebab)

          list.appendChild(item)
        }

        const tasks = currentTasks[folder]
        if (tasks && tasks.length > 0) {
          const done = tasks.filter(t => t.status === 'completed').length
          const inProgress = tasks.filter(t => t.status === 'in_progress').length
          const summary = document.createElement('div')
          summary.style.cssText = 'padding:2px 14px 8px 28px;font-size:11px;color:var(--text-muted);'
          summary.textContent = `Tasks: ${done}/${tasks.length} done${inProgress > 0 ? `, ${inProgress} active` : ''}`
          list.appendChild(summary)
        }
      }
    }

    // Kebab popover — creates an inline menu anchored under the session row.
    // Click-outside or Esc closes it.
    let _openKebabRow = null
    function closeSessionMenu() {
      if (_openKebabRow) {
        _openKebabRow.classList.remove('menu-open')
        const existing = _openKebabRow.querySelector('.kebab-menu')
        if (existing) existing.remove()
        _openKebabRow = null
      }
    }
    function openSessionMenu(row, s) {
      if (_openKebabRow === row) { closeSessionMenu(); return }
      closeSessionMenu()
      _openKebabRow = row
      row.classList.add('menu-open')

      const menu = document.createElement('div')
      menu.className = 'kebab-menu'
      menu.onclick = (e) => e.stopPropagation()

      // --- Trust segmented control ---
      const trustLabel = document.createElement('div')
      trustLabel.className = 'kebab-label'
      trustLabel.textContent = 'Trust'
      menu.appendChild(trustLabel)

      const trustRow = document.createElement('div')
      trustRow.className = 'kebab-segmented'
      const currentTrust = s.trust || 'ask'
      for (const level of ['strict', 'ask', 'auto', 'yolo']) {
        const seg = document.createElement('button')
        seg.className = 'kebab-seg'
        seg.textContent = level
        seg.setAttribute('aria-pressed', String(level === currentTrust))
        seg.title = level === 'yolo' ? 'yolo — auto-allow EVERYTHING including destructive ops' :
                   level === 'auto' ? 'auto — allow routine edits/commands; prompt on dangerous' :
                   level === 'ask'  ? 'ask — prompt on anything that writes or runs arbitrary code' :
                                     'strict — prompt on every non-trivial action'
        seg.onclick = async () => {
          try {
            await fetch('/api/trust', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: s.name, level }),
            })
            closeSessionMenu()
          } catch (err) { console.error('Trust change failed', err) }
        }
        trustRow.appendChild(seg)
      }
      menu.appendChild(trustRow)

      // --- Autopilot toggle ---
      const apEnabled = !!(s.autopilot?.enabled)
      const apItem = document.createElement('button')
      apItem.className = 'kebab-item'
      apItem.innerHTML = `<span>🤖</span><span>${apEnabled ? 'Autopilot — ON (click to turn off)' : 'Autopilot — OFF (click to turn on)'}</span>`
      apItem.onclick = async () => {
        try {
          await fetch('/api/autopilot', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: s.name, enabled: !apEnabled }),
          })
          closeSessionMenu()
        } catch (err) { console.error('Autopilot toggle failed', err) }
      }
      menu.appendChild(apItem)

      // --- Add teammate (lead only) ---
      const isLead = (s.teamIndex ?? 0) === 0
      if (isLead && s.status === 'active') {
        const addTm = document.createElement('button')
        addTm.className = 'kebab-item'
        addTm.innerHTML = '<span>➕</span><span>Add teammate</span>'
        addTm.onclick = () => { addTeammate(s.name); closeSessionMenu() }
        menu.appendChild(addTm)
      }

      menu.appendChild(Object.assign(document.createElement('div'), { className: 'kebab-sep' }))

      // --- Status-dependent actions ---
      if (s.status === 'disconnected') {
        const restart = document.createElement('button')
        restart.className = 'kebab-item'
        restart.innerHTML = '<span>↻</span><span>Restart session</span>'
        restart.onclick = () => { openRestartPopover(s.name, s.path, restart); closeSessionMenu() }
        menu.appendChild(restart)

        const remove = document.createElement('button')
        remove.className = 'kebab-item danger'
        remove.innerHTML = '<span>✕</span><span>Remove from list</span>'
        remove.onclick = () => { removeSession(s.name); closeSessionMenu() }
        menu.appendChild(remove)
      } else {
        const close = document.createElement('button')
        close.className = 'kebab-item danger'
        close.innerHTML = `<span>✕</span><span>${s.managed ? 'Close session' : 'Remove from list (Claude keeps running)'}</span>`
        close.onclick = () => { closeSession(s.name); closeSessionMenu() }
        menu.appendChild(close)
      }

      row.appendChild(menu)
    }

    // Close the kebab menu on outside click or Esc
    document.addEventListener('click', () => closeSessionMenu())
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSessionMenu() })

    async function addTeammate(leadName) {
      try {
        const res = await fetch('/api/team/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ leadName })
        })
        if (!res.ok) throw new Error(await res.text())
      } catch (err) {
        alert('Failed to add teammate: ' + err)
      }
    }

    function selectSession(name) {
      activeSession = name
      unreadBySession[name] = 0

      // Update header
      const session = sessions.find(s => s.name === name)
      document.getElementById('session-title').textContent = name
      document.getElementById('session-title').style.color = ''

      const badge = document.getElementById('trust-badge')
      const tmuxCmd = document.getElementById('tmux-cmd')
      if (session) {
        badge.style.display = ''
        badge.textContent = session.trust === 'auto' ? 'auto' : session.trust
        badge.className = 'trust-badge' + (session.trust === 'auto' ? ' auto' : '')
        tmuxCmd.style.display = ''
        tmuxCmd.textContent = `tmux attach -t hub-${name}`
      } else {
        badge.style.display = 'none'
        tmuxCmd.style.display = 'none'
      }

      // Show the compose area now that a session is active
      const compose = document.getElementById('compose-area')
      if (compose) compose.style.display = ''

      // Render messages
      const area = document.getElementById('messages')
      area.innerHTML = ''

      const msgs = messagesBySession[name] || []
      for (const m of msgs) {
        appendMessage(m, false)
      }

      renderSidebar()
      scrollToBottom()
    }

    function appendMessage(msg, isOther) {
      const area = document.getElementById('messages')

      // Remove empty state
      const empty = document.getElementById('no-session')
      if (empty) empty.remove()

      const row = document.createElement('div')
      row.className = 'msg-row ' + (msg.role === 'user' ? 'user' : isOther ? 'other' : 'claude')

      if (isOther && msg.fromSession) {
        const tag = document.createElement('div')
        tag.className = 'session-tag'
        tag.textContent = msg.fromSession
        row.appendChild(tag)
      }

      const bubble = document.createElement('div')
      bubble.className = 'msg-bubble'
      if (msg.role === 'user') {
        // User input — keep as plain text so '*foo*' from a typo doesn't surprise the user
        bubble.innerHTML = escapeHtml(msg.text || '').replace(/\n/g, '<br>')
      } else {
        // Claude / other-session — render markdown (tables, code, lists, headings, ...)
        bubble.classList.add('md')
        bubble.innerHTML = renderMarkdown(msg.text || '')
      }

      row.appendChild(bubble)

      if (msg.files && msg.files.length > 0) {
        for (const f of msg.files) {
          const link = document.createElement('a')
          link.href = '#'
          link.textContent = escapeHtml(f)
          link.style.cssText = 'display:block;font-size:11px;color:#4a9eff;margin-top:4px;'
          row.appendChild(link)
        }
      }

      area.appendChild(row)
      scrollToBottom()
    }

    function scrollToBottom() {
      const area = document.getElementById('messages')
      area.scrollTop = area.scrollHeight
    }

    // Send message
    async function sendMsg() {
      const input = document.getElementById('msg-input')
      const text = input.value.trim()
      if ((!text && pendingFiles.length === 0) || !activeSession) return

      // Upload files first
      const filePaths = await uploadFiles()
      const fileNote = filePaths.length > 0
        ? '\n\n[Files uploaded: ' + filePaths.join(', ') + ']'
        : ''
      const fullText = (text || 'See attached files') + fileNote + getActiveTagsText()
      const displayText = text + (filePaths.length > 0 ? '\n📎 ' + filePaths.map(p => p.split('/').pop()).join(', ') : '')

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'message', text: fullText, sessionName: activeSession }))
      }

      // Optimistic UI
      if (!messagesBySession[activeSession]) messagesBySession[activeSession] = []
      messagesBySession[activeSession].push({ role: 'user', text: displayText, ts: Date.now() })
      appendMessage({ role: 'user', text: displayText }, false)

      input.value = ''
      autoResize(input)
    }

    function handleKey(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault()
        sendMsg()
      }
    }

    function autoResize(el) {
      el.style.height = 'auto'
      el.style.height = Math.min(el.scrollHeight, 120) + 'px'
    }

    // Permission card
    function showPermissionCard(req) {
      const area = document.getElementById('messages')

      const card = document.createElement('div')
      card.className = 'perm-card'
      card.id = `perm-${req.requestId}`

      card.innerHTML = `
        <h4>Permission Request — ${escapeHtml(req.sessionName)}</h4>
        <div class="perm-detail">Tool: <code>${escapeHtml(req.toolName)}</code></div>
        <div class="perm-detail">${escapeHtml(req.description)}</div>
        <div class="perm-detail">Preview: <code>${escapeHtml(req.inputPreview)}</code></div>
        <div class="perm-actions">
          <button class="perm-allow" onclick="respondPermission('${escapeHtml(req.requestId)}', 'allow')">Allow</button>
          <button class="perm-allow" style="background:#1a3a3a;color:#4acfcf;border-color:#4acfcf;" onclick="respondPermission('${escapeHtml(req.requestId)}', 'always')">Always Allow</button>
          <button class="perm-deny" onclick="respondPermission('${escapeHtml(req.requestId)}', 'deny')">Deny</button>
        </div>
      `

      area.appendChild(card)
      scrollToBottom()
    }

    function respondPermission(requestId, behavior) {
      // 'allow' = Yes (option 1), 'always' = Yes don't ask again (option 2), 'deny' = No (option 3)
      const mappedBehavior = behavior === 'always' ? 'allow' : behavior
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'permission_response', requestId, behavior: mappedBehavior, option: behavior === 'always' ? 2 : behavior === 'allow' ? 1 : 3 }))
      }
      const card = document.getElementById(`perm-${requestId}`)
      if (card) {
        const label = behavior === 'deny' ? 'denied' : behavior === 'always' ? 'always allowed' : 'allowed'
        card.innerHTML = `<div style="color: var(--text-muted); font-size: 12px;">Permission ${label}</div>`
      }
    }

    // Copy tmux command
    function copyTmuxCmd() {
      const cmd = document.getElementById('tmux-cmd').textContent
      navigator.clipboard.writeText(cmd).then(() => {
        const el = document.getElementById('tmux-cmd')
        const orig = el.textContent
        el.textContent = 'Copied!'
        setTimeout(() => { el.textContent = orig }, 1000)
      })
    }

    function formatRelativeTime(sec, nowSec) {
      const now = nowSec ?? Math.floor(Date.now() / 1000)
      const diff = now - sec
      if (diff < 60) return 'just now'
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`
      const days = Math.floor(diff / 86400)
      if (days === 1) return 'yesterday'
      if (days <= 7) return `${days}d ago`
      const d = new Date(sec * 1000)
      return d.toLocaleString('en-US', { month: 'short', day: 'numeric' })
    }

    async function loadPriorSessions(name) {
      const res = await fetch(`/api/sessions/${encodeURIComponent(name)}/prior`)
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
      const body = await res.json()
      return Array.isArray(body.sessions) ? body.sessions : []
    }

    async function spawnResume(name, folderPath, resume) {
      const body = { name, path: folderPath }
      if (resume) body.resume = resume
      const res = await fetch('/api/spawn', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      })
      if (!res.ok) throw new Error(await res.text())
    }

    let _popoverClose = null
    function openRestartPopover(name, rawPath, anchorEl) {
      // Strip :N session-key suffix to get the real folder path.
      const folderPath = rawPath ? rawPath.replace(/:\d+$/, '') : ''

      // Close any existing popover — closes the DOM node AND removes its listeners.
      if (_popoverClose) _popoverClose()

      const pop = document.createElement('div')
      pop.className = 'restart-popover'
      pop.tabIndex = -1

      // Position anchored to the button
      const rect = anchorEl.getBoundingClientRect()
      pop.style.top = `${rect.bottom + 4}px`
      pop.style.left = `${rect.left}px`
      document.body.appendChild(pop)
      // Flip if it overflows the viewport
      const pr = pop.getBoundingClientRect()
      if (pr.right > window.innerWidth - 8) {
        pop.style.left = `${Math.max(8, rect.right - pr.width)}px`
      }

      pop.innerHTML = '<div class="rp-section">Loading…</div>'

      const focusables = []
      let focusIdx = 0

      function setFocus(i) {
        focusIdx = Math.max(0, Math.min(focusables.length - 1, i))
        focusables.forEach((el, j) => el.classList.toggle('focused', j === focusIdx))
        focusables[focusIdx]?.scrollIntoView({ block: 'nearest' })
      }

      function close() {
        if (_popoverClose === close) _popoverClose = null
        pop.remove()
        document.removeEventListener('keydown', onKey)
        document.removeEventListener('mousedown', onOutside)
      }
      _popoverClose = close

      async function doAction(resume) {
        close()
        try {
          await spawnResume(name, folderPath, resume)
        } catch (err) {
          alert('Restart failed: ' + err.message)
        }
      }

      function render(sessions) {
        // Guard: popover may have been closed while the fetch was in flight.
        if (!pop.isConnected) return
        pop.innerHTML = ''
        focusables.length = 0

        if (sessions.length > 0) {
          const header = document.createElement('div')
          header.className = 'rp-section'
          header.textContent = 'Resume'
          pop.appendChild(header)

          for (const s of sessions) {
            const item = document.createElement('div')
            item.className = 'rp-item'
            item.innerHTML = `
              <span class="rp-preview"></span>
              <span class="rp-time"></span>
            `
            item.querySelector('.rp-preview').textContent = s.firstUserMessage || '(no messages)'
            item.querySelector('.rp-time').textContent = formatRelativeTime(s.mtime)
            item.onclick = () => doAction({ sessionId: s.id })
            pop.appendChild(item)
            focusables.push(item)
          }

          const hr = document.createElement('hr')
          pop.appendChild(hr)
        }

        const newItem = document.createElement('div')
        newItem.className = 'rp-item'
        newItem.innerHTML = '<span class="rp-preview">✨ New session</span>'
        newItem.onclick = () => doAction(undefined)
        pop.appendChild(newItem)
        focusables.push(newItem)

        setFocus(0)
        pop.focus()
      }

      function onKey(e) {
        if (e.key === 'Escape') { e.preventDefault(); close(); return }
        if (e.key === 'ArrowDown') { e.preventDefault(); setFocus(focusIdx + 1); return }
        if (e.key === 'ArrowUp') { e.preventDefault(); setFocus(focusIdx - 1); return }
        if (e.key === 'Enter') {
          e.preventDefault()
          focusables[focusIdx]?.click()
        }
      }

      function onOutside(e) {
        if (!pop.contains(e.target) && e.target !== anchorEl) close()
      }

      document.addEventListener('keydown', onKey)
      document.addEventListener('mousedown', onOutside)

      loadPriorSessions(name)
        .then(render)
        .catch(() => render([]))  // treat fetch errors as "no prior sessions" → only New shown
    }

    async function closeSession(name) {
      if (!confirm(`Close session '${name}'? Claude will exit, then the tmux will close.`)) return
      try {
        await fetch('/api/kill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        })
      } catch (err) {
        console.error('Close failed', err)
      }
    }

    async function removeSession(name) {
      if (!confirm(`Remove '${name}' from the list?`)) return
      try {
        const res = await fetch('/api/remove', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        })
        if (!res.ok) throw new Error(await res.text())
      } catch (err) {
        alert('Remove failed: ' + err)
      }
    }

    // Spawn dialog
    function promptSpawn() {
      // Create modal
      const overlay = document.createElement('div')
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center;'

      const modal = document.createElement('div')
      modal.style.cssText = 'background:var(--sidebar);border:1px solid var(--border);border-radius:12px;padding:24px;width:400px;max-width:90vw;'
      modal.innerHTML = `
        <div style="font-size:16px;font-weight:600;margin-bottom:16px;color:var(--accent);">Spawn New Session</div>
        <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;">Session Name</label>
        <input id="spawn-name" type="text" placeholder="my-project" style="width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;margin-bottom:12px;outline:none;" />
        <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;">Project Path</label>
        <input id="spawn-path" type="text" placeholder="/home/" style="width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;margin-bottom:4px;outline:none;" />
        <div id="spawn-suggestions" style="max-height:150px;overflow-y:auto;margin-bottom:12px;"></div>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);margin-bottom:12px;cursor:pointer;">
          <input type="checkbox" id="spawn-team" />
          Run as team
          <input type="number" id="spawn-team-size" value="3" min="2" max="10" style="width:50px;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;padding:4px;color:var(--text);font-size:12px;display:none;" />
        </label>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button id="spawn-cancel" style="background:none;border:1px solid var(--border);color:var(--text-muted);padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;">Cancel</button>
          <button id="spawn-submit" style="background:var(--accent);color:white;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;">Spawn</button>
        </div>
      `
      overlay.appendChild(modal)
      document.body.appendChild(overlay)

      const nameInput = document.getElementById('spawn-name')
      const pathInput = document.getElementById('spawn-path')
      const suggestions = document.getElementById('spawn-suggestions')

      const teamCheck = document.getElementById('spawn-team')
      const teamSizeInput = document.getElementById('spawn-team-size')
      teamCheck.addEventListener('change', () => {
        teamSizeInput.style.display = teamCheck.checked ? '' : 'none'
      })

      nameInput.focus()

      // Browse directories as user types path
      let browseTimeout = null
      pathInput.addEventListener('input', () => {
        clearTimeout(browseTimeout)
        browseTimeout = setTimeout(() => browsePath(pathInput.value), 300)
      })
      // Seed with the server's configured browse root (defaults to $HOME).
      // Sending no path asks the server to echo its root back.
      browsePath('', true)

      async function browsePath(path, seedInput = false) {
        try {
          const qs = path ? '?path=' + encodeURIComponent(path) : ''
          const res = await fetch('/api/browse' + qs)
          if (!res.ok) return
          const data = await res.json()
          const dirs = Array.isArray(data) ? data : (data.dirs || [])
          if (seedInput && !pathInput.value && data.root) {
            pathInput.value = data.root
          }
          suggestions.innerHTML = ''
          for (const d of dirs) {
            const item = document.createElement('div')
            item.textContent = d
            item.style.cssText = 'padding:6px 10px;cursor:pointer;font-size:12px;color:var(--text);border-radius:4px;font-family:monospace;'
            item.onmouseenter = () => item.style.background = 'rgba(255,255,255,0.06)'
            item.onmouseleave = () => item.style.background = ''
            item.onclick = () => {
              pathInput.value = d
              browsePath(d)
              // Auto-fill name from folder
              const parts = d.replace(/\/+$/, '').split('/')
              nameInput.value = parts[parts.length - 1] || ''
            }
            suggestions.appendChild(item)
          }
        } catch {}
      }

      document.getElementById('spawn-cancel').onclick = () => overlay.remove()
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove() }

      document.getElementById('spawn-submit').onclick = () => {
        const name = nameInput.value.trim()
        const path = pathInput.value.trim()
        if (!name || !path) return
        if (ws && ws.readyState === WebSocket.OPEN) {
          const isTeam = document.getElementById('spawn-team').checked
          const size = isTeam ? parseInt(document.getElementById('spawn-team-size').value) || 3 : 1
          const tags = getActiveTagsText()
          ws.send(JSON.stringify({ type: 'spawn', name, path, teamSize: size, instructions: tags || undefined }))
        }
        overlay.remove()
      }
    }

    // File attachments
    let pendingFiles = []

    function handleFileSelect(input) {
      for (const file of input.files) {
        pendingFiles.push(file)
      }
      input.value = ''
      renderAttachedFiles()
    }

    function renderAttachedFiles() {
      const container = document.getElementById('attached-files')
      if (pendingFiles.length === 0) {
        container.style.display = 'none'
        return
      }
      container.style.display = 'flex'
      container.innerHTML = ''
      pendingFiles.forEach((file, i) => {
        const chip = document.createElement('div')
        chip.style.cssText = 'display:flex;align-items:center;gap:4px;background:var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--text);'
        const isImage = file.type.startsWith('image/')
        chip.innerHTML = `${isImage ? '🖼' : '📄'} ${escapeHtml(file.name)} <span style="cursor:pointer;color:var(--accent);margin-left:2px;" onclick="removeFile(${i})">✕</span>`
        if (isImage) {
          const thumb = document.createElement('img')
          thumb.src = URL.createObjectURL(file)
          thumb.style.cssText = 'width:20px;height:20px;object-fit:cover;border-radius:3px;'
          chip.prepend(thumb)
        }
        container.appendChild(chip)
      })
    }

    function removeFile(index) {
      pendingFiles.splice(index, 1)
      renderAttachedFiles()
    }

    async function uploadFiles() {
      if (pendingFiles.length === 0) return []
      const uploadedPaths = []
      for (const file of pendingFiles) {
        const formData = new FormData()
        formData.append('file', file)
        formData.append('sessionName', activeSession || '_temp')
        try {
          const res = await fetch('/api/upload-temp', { method: 'POST', body: formData })
          if (res.ok) {
            const data = await res.json()
            uploadedPaths.push(data.path)
          }
        } catch {}
      }
      pendingFiles = []
      renderAttachedFiles()
      return uploadedPaths
    }

    // Drag-and-drop file upload
    document.addEventListener('dragenter', (e) => {
      e.preventDefault()
      document.body.classList.add('dragging')
    })

    document.addEventListener('dragleave', (e) => {
      if (!e.relatedTarget || e.relatedTarget === document.documentElement) {
        document.body.classList.remove('dragging')
      }
    })

    document.addEventListener('dragover', (e) => {
      e.preventDefault()
    })

    document.addEventListener('drop', (e) => {
      e.preventDefault()
      document.body.classList.remove('dragging')

      const files = e.dataTransfer?.files
      if (!files || files.length === 0) return

      for (const file of files) {
        pendingFiles.push(file)
      }
      renderAttachedFiles()
    })

    // Paste-to-upload (screenshots via Ctrl+V / Cmd+V)
    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items
      if (!items || items.length === 0) return
      const pasted = []
      for (const item of items) {
        if (item.kind !== 'file') continue
        const file = item.getAsFile()
        if (!file) continue
        let name = file.name
        if (!name || name === 'image.png') {
          const ext = (file.type.split('/')[1] || 'png').split('+')[0]
          name = `pasted-${Date.now()}.${ext}`
        }
        pasted.push(new File([file], name, { type: file.type }))
      }
      if (pasted.length === 0) return
      e.preventDefault()
      for (const f of pasted) pendingFiles.push(f)
      renderAttachedFiles()
    })

    // Telegram Login
    let currentUser = null

    function checkAuth() {
      const saved = localStorage.getItem('hub_user')
      if (saved) {
        try {
          currentUser = JSON.parse(saved)
          showApp()
          return
        } catch {}
      }
      showLogin()
    }

    function showLogin() {
      document.getElementById('sidebar').style.display = 'none'
      document.getElementById('main').style.display = 'none'
      document.getElementById('login-screen').style.display = 'flex'
      // Load Telegram widget only when login screen is shown
      const container = document.getElementById('telegram-widget-container')
      if (container && !container.hasChildNodes()) {
        const script = document.createElement('script')
        script.src = 'https://telegram.org/js/telegram-widget.js?23'
        script.async = true
        script.setAttribute('data-telegram-login', '__TELEGRAM_BOT_USERNAME__')
        script.setAttribute('data-size', 'large')
        script.setAttribute('data-onauth', 'onTelegramAuth(user)')
        script.setAttribute('data-request-access', 'write')
        container.appendChild(script)
      }
    }

    function showApp() {
      document.getElementById('login-screen').style.display = 'none'
      document.getElementById('sidebar').style.display = ''
      document.getElementById('main').style.display = ''
      const footerUser = document.getElementById('footer-user')
      if (footerUser && currentUser) {
        const display = currentUser.username ? `@${currentUser.username}` :
                        currentUser.first_name ? currentUser.first_name :
                        `user ${currentUser.id}`
        footerUser.textContent = display
        footerUser.title = display
      }
      connectWs()
    }

    window.onTelegramAuth = async function(user) {
      // Verify with server
      try {
        const res = await fetch('/api/auth/telegram', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(user)
        })
        if (!res.ok) {
          const err = await res.text()
          alert('Login denied: ' + err)
          return
        }
        currentUser = user
        localStorage.setItem('hub_user', JSON.stringify(user))
        showApp()
      } catch (err) {
        alert('Login failed: ' + err)
      }
    }

    function logout() {
      currentUser = null
      localStorage.removeItem('hub_user')
      if (ws) ws.close()
      showLogin()
    }

    // Init
    checkAuth()
  </script>
</body>
</html>
