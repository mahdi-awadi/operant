<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Hub</title>
  <!-- Markdown renderer + sanitizer for chat bubbles -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Dark (default) — same palette as before */
      --bg: #1a1a2e;
      --sidebar: #16213e;
      --border: #0f3460;
      --accent: #e94560;
      --text: #e0e0e0;
      --text-muted: #888;
      --user-bubble: #1a3a6e;
      --claude-bubble: #1e1e3a;
      --input-bg: #0d0d1a;
    }

    /* Light — white canvas, dark text, muted accents */
    body[data-theme="light"] {
      --bg: #fafafa;
      --sidebar: #f0f2f5;
      --border: #dcdfe4;
      --accent: #2563eb;
      --text: #1f2328;
      --text-muted: #6b7280;
      --user-bubble: #dbeafe;
      --claude-bubble: #f3f4f6;
      --input-bg: #ffffff;
    }

    /* Blue — deep, saturated ocean */
    body[data-theme="blue"] {
      --bg: #0b1b2c;
      --sidebar: #12263b;
      --border: #1e3a5f;
      --accent: #38bdf8;
      --text: #e6f2ff;
      --text-muted: #7aa3c9;
      --user-bubble: #1e3a5f;
      --claude-bubble: #13273c;
      --input-bg: #08142a;
    }

    /* Smooth — soft pastel, low contrast, calm */
    body[data-theme="smooth"] {
      --bg: #2a2433;
      --sidebar: #322b3d;
      --border: #443a55;
      --accent: #b794f4;
      --text: #ede6f4;
      --text-muted: #a89ab0;
      --user-bubble: #3d3449;
      --claude-bubble: #33293f;
      --input-bg: #231d2c;
    }

    /* Solarized — classic warm palette */
    body[data-theme="solarized"] {
      --bg: #002b36;
      --sidebar: #073642;
      --border: #586e75;
      --accent: #b58900;
      --text: #fdf6e3;
      --text-muted: #93a1a1;
      --user-bubble: #094352;
      --claude-bubble: #073642;
      --input-bg: #001e26;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width 0.2s;
    }

    #sidebar-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #hub-title {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--accent);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Unified icon button — used for spawn, theme, kebab, row actions */
    .icon-btn {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      flex-shrink: 0;
      padding: 0;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); border-color: var(--text-muted); }
    .icon-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .icon-btn.primary:hover { opacity: 0.88; }
    .icon-btn.danger:hover { color: #f87171; border-color: #f87171; }

    /* Light theme wants a subtler hover */
    body[data-theme="light"] .icon-btn:hover { background: rgba(0,0,0,0.05); }

    #spawn-btn { /* legacy id kept — styling now via .icon-btn */ }

    #sidebar-footer {
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }
    #sidebar-footer button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      padding: 4px 6px;
      border-radius: 4px;
    }
    #sidebar-footer button:hover { background: rgba(255,255,255,0.05); color: var(--text); }

    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    /* Folder group header — small muted label above sessions in a folder */
    .group-header {
      padding: 10px 14px 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.75;
    }

    .session-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
      position: relative;
      min-height: 36px;
    }
    .session-item:hover { background: rgba(255,255,255,0.04); }
    body[data-theme="light"] .session-item:hover { background: rgba(0,0,0,0.04); }
    .session-item.active {
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      border-left-color: var(--accent);
    }
    .session-item.teammate { padding-left: 30px; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.active { background: #4caf50; }
    .status-dot.disconnected { background: #f44336; }
    .status-dot.respawning { background: #ff9800; }

    .session-name {
      flex: 1;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Kebab button reveals on hover or when menu is open */
    .kebab-btn {
      width: 24px;
      height: 24px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;       /* don't eat clicks while invisible */
      transition: opacity 0.1s, background 0.1s;
      flex-shrink: 0;
      font-size: 16px;
      line-height: 1;
      padding: 0;
    }
    .session-item:hover .kebab-btn,
    .session-item.menu-open .kebab-btn {
      opacity: 1;
      pointer-events: auto;       /* clickable only when visible */
    }
    .kebab-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    body[data-theme="light"] .kebab-btn:hover { background: rgba(0,0,0,0.08); }

    /* Kebab popover menu */
    .kebab-menu {
      position: absolute;
      top: 100%;
      right: 8px;
      margin-top: 2px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      z-index: 50;
      min-width: 220px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    body[data-theme="light"] .kebab-menu { box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

    .kebab-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      font-size: 12px;
      color: var(--text);
      border-radius: 5px;
      cursor: pointer;
      background: none;
      border: none;
      text-align: left;
      width: 100%;
    }
    .kebab-item:hover { background: rgba(255,255,255,0.06); }
    body[data-theme="light"] .kebab-item:hover { background: rgba(0,0,0,0.06); }
    .kebab-item.danger { color: #f87171; }
    .kebab-sep {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }
    .kebab-label {
      font-size: 10px;
      color: var(--text-muted);
      padding: 4px 10px 2px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .kebab-segmented {
      display: flex;
      gap: 4px;
      padding: 4px 10px 6px;
    }
    .kebab-seg {
      flex: 1;
      padding: 4px 6px;
      font-size: 11px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 4px;
      cursor: pointer;
    }
    .kebab-seg[aria-pressed="true"] {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .kebab-seg:hover { border-color: var(--text-muted); }

    .badge {
      background: var(--accent);
      color: white;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 11px;
      min-width: 18px;
      text-align: center;
    }

    /* Main area */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--sidebar);
    }

    #session-title {
      font-weight: 600;
      font-size: 15px;
    }

    .trust-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      background: var(--border);
      color: var(--text-muted);
    }
    .trust-badge.auto { background: #1a3a1a; color: #4caf50; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }
    .msg-row.user { align-self: flex-end; align-items: flex-end; }
    .msg-row.claude { align-self: flex-start; align-items: flex-start; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; opacity: 0.75; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    /* User bubbles stay plain-text; claude bubbles get full markdown rendering */
    .msg-row.user .msg-bubble { background: var(--user-bubble); border-radius: 12px 12px 2px 12px; white-space: pre-wrap; }
    .msg-row.claude .msg-bubble { background: var(--claude-bubble); border: 1px solid var(--border); border-radius: 12px 12px 12px 2px; }
    .msg-row.other .msg-bubble { background: var(--claude-bubble); border: 1px solid var(--border); font-style: italic; border-radius: 12px 12px 12px 2px; }

    /* ─── Markdown rendering inside Claude's bubble ─── */
    .msg-bubble.md > *:first-child { margin-top: 0; }
    .msg-bubble.md > *:last-child { margin-bottom: 0; }
    .msg-bubble.md p { margin: 0.5em 0; }

    /* Headings */
    .msg-bubble.md h1,
    .msg-bubble.md h2,
    .msg-bubble.md h3,
    .msg-bubble.md h4,
    .msg-bubble.md h5,
    .msg-bubble.md h6 {
      font-weight: 700;
      line-height: 1.25;
      margin: 0.9em 0 0.4em;
      color: var(--text);
    }
    .msg-bubble.md h1 { font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
    .msg-bubble.md h2 { font-size: 1.25em; border-bottom: 1px solid var(--border); padding-bottom: 0.15em; }
    .msg-bubble.md h3 { font-size: 1.12em; }
    .msg-bubble.md h4 { font-size: 1.02em; }
    .msg-bubble.md h5,
    .msg-bubble.md h6 { font-size: 1em; color: var(--text-muted); }

    /* Inline code & code blocks */
    .msg-bubble.md code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.88em;
      background: rgba(0,0,0,0.35);
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    body[data-theme="light"] .msg-bubble.md code { background: rgba(0,0,0,0.05); }
    .msg-bubble.md pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin: 0.6em 0;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.45;
    }
    body[data-theme="light"] .msg-bubble.md pre { background: rgba(0,0,0,0.04); }
    .msg-bubble.md pre code {
      background: transparent;
      border: none;
      padding: 0;
      font-size: inherit;
    }

    /* Lists */
    .msg-bubble.md ul,
    .msg-bubble.md ol {
      margin: 0.4em 0;
      padding-left: 1.4em;
    }
    .msg-bubble.md li { margin: 0.2em 0; }
    .msg-bubble.md li > p { margin: 0; }
    .msg-bubble.md li > ul,
    .msg-bubble.md li > ol { margin: 0.2em 0; }

    /* Tables — the big win */
    .msg-bubble.md {
      /* Allow tables to scroll horizontally inside the bubble instead of overflowing */
      overflow-x: auto;
    }
    .msg-bubble.md table {
      border-collapse: collapse;
      margin: 0.6em 0;
      font-size: 0.92em;
      max-width: 100%;
    }
    .msg-bubble.md th,
    .msg-bubble.md td {
      border: 1px solid var(--border);
      padding: 5px 10px;
      text-align: left;
      vertical-align: top;
    }
    .msg-bubble.md th {
      background: rgba(255,255,255,0.04);
      font-weight: 600;
    }
    body[data-theme="light"] .msg-bubble.md th { background: rgba(0,0,0,0.04); }
    .msg-bubble.md tbody tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    body[data-theme="light"] .msg-bubble.md tbody tr:nth-child(even) td { background: rgba(0,0,0,0.02); }

    /* Blockquotes */
    .msg-bubble.md blockquote {
      margin: 0.5em 0;
      padding: 4px 12px;
      border-left: 3px solid var(--accent);
      color: var(--text-muted);
      background: rgba(255,255,255,0.02);
      border-radius: 0 4px 4px 0;
    }
    body[data-theme="light"] .msg-bubble.md blockquote { background: rgba(0,0,0,0.03); }
    .msg-bubble.md blockquote > *:first-child { margin-top: 0; }
    .msg-bubble.md blockquote > *:last-child { margin-bottom: 0; }

    /* Horizontal rule */
    .msg-bubble.md hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1em 0;
    }

    /* Links */
    .msg-bubble.md a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .msg-bubble.md a:hover { opacity: 0.85; }

    /* Inline emphasis */
    .msg-bubble.md strong { font-weight: 700; }
    .msg-bubble.md em { font-style: italic; }
    .msg-bubble.md del { opacity: 0.6; }

    .msg-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin: 2px 4px;
    }

    .session-tag {
      display: inline-block;
      background: var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      margin-bottom: 3px;
      color: var(--text-muted);
    }

    /* Permission card */
    .perm-card {
      background: #1a2a1a;
      border: 1px solid #2a5a2a;
      border-radius: 10px;
      padding: 12px 14px;
      max-width: 420px;
      align-self: flex-start;
    }
    .perm-card h4 { color: #ff9800; font-size: 13px; margin-bottom: 6px; }
    .perm-card .perm-detail { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .perm-card code { background: rgba(0,0,0,0.3); padding: 1px 4px; border-radius: 3px; font-size: 11px; }
    .perm-actions { display: flex; gap: 8px; margin-top: 10px; }
    .perm-allow { background: #2a5a2a; color: #4caf50; border: 1px solid #4caf50; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .perm-allow:hover { background: #3a7a3a; }
    .perm-deny { background: #4a1a1a; color: #f44336; border: 1px solid #f44336; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .perm-deny:hover { background: #6a2a2a; }

    /* Input area */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      background: var(--input-bg);
    }

    #msg-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      resize: none;
      min-height: 42px;
      max-height: 120px;
    }
    #msg-input:focus { outline: none; border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    /* Drop overlay */
    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(233,69,96,0.15);
      border: 3px dashed var(--accent);
      z-index: 100;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      color: var(--accent);
    }
    body.dragging #drop-overlay { display: flex; }

    /* No session */
    #no-session {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Restart popover */
    .restart-popover {
      position: absolute;
      z-index: 150;
      background: var(--sidebar);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      min-width: 280px;
      max-width: 360px;
      padding: 6px 0;
      font-size: 12px;
    }
    .restart-popover .rp-section {
      padding: 6px 12px;
      color: var(--text-muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .restart-popover .rp-item {
      padding: 8px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }
    .restart-popover .rp-item:hover,
    .restart-popover .rp-item.focused { background: rgba(255,255,255,0.06); }
    .restart-popover .rp-item.disabled { opacity: 0.4; cursor: default; }
    .restart-popover .rp-preview {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .restart-popover .rp-time {
      color: var(--text-muted);
      font-size: 11px;
      flex-shrink: 0;
    }
    .restart-popover hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }

    /* Autopilot badge — shown next to session name when enabled */
    .ap-badge { font-size: 13px; flex-shrink: 0; }

    /* Personality modal + picker */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-card {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px 18px; min-width: 480px; max-width: 720px; max-height: 85vh;
      overflow: auto; display: flex; flex-direction: column;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    }
    body[data-theme="light"] .modal-card { box-shadow: 0 16px 40px rgba(0,0,0,0.18); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .persona-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    }
    .persona-row:hover { background: rgba(255,255,255,0.03); }
    body[data-theme="light"] .persona-row:hover { background: rgba(0,0,0,0.03); }
    .modal-card input, .modal-card textarea {
      background: var(--input-bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 5px;
      padding: 6px 8px; font: inherit; width: 100%;
    }
    .modal-card input:focus, .modal-card textarea:focus { outline: none; border-color: #4acfcf; }
    .kebab-item.primary { color: #4acfcf; font-weight: 600; }
    .kebab-item.active { background: rgba(74,207,207,0.08); }

    /* Personality picker — a focused modal with grouped options */
    .persona-picker-card {
      min-width: 380px;
      max-width: 440px;
      gap: 4px;
    }
    .persona-group {
      display: flex; flex-direction: column; gap: 4px;
      margin-top: 2px;
    }
    .persona-group-heading {
      margin-top: 14px; margin-bottom: 4px;
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .persona-option {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font: inherit; cursor: pointer;
      transition: background 0.08s, border-color 0.08s;
      text-align: left;
    }
    body[data-theme="light"] .persona-option { background: rgba(0,0,0,0.02); }
    .persona-option:hover { background: rgba(74,207,207,0.06); border-color: #4acfcf80; }
    .persona-option.active {
      background: rgba(74,207,207,0.12);
      border-color: #4acfcf;
    }
    body[data-theme="light"] .persona-option.active { background: rgba(0,139,139,0.08); border-color: #008b8b; }
    .persona-option-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 1.5px solid var(--text-muted);
      margin-top: 3px; flex-shrink: 0;
      transition: background 0.08s, border-color 0.08s;
    }
    .persona-option-dot.filled {
      background: #4acfcf; border-color: #4acfcf;
      box-shadow: inset 0 0 0 2px var(--bg);
    }
    body[data-theme="light"] .persona-option-dot.filled { background: #008b8b; border-color: #008b8b; }
    .persona-option-name {
      font-weight: 600; font-size: 13px;
      display: flex; align-items: center; gap: 6px;
    }
    .persona-option-tag {
      font-size: 10px; font-weight: 500;
      padding: 1px 6px; border-radius: 999px;
      background: rgba(255,255,255,0.06); color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    body[data-theme="light"] .persona-option-tag { background: rgba(0,0,0,0.06); }
    .persona-option-tag.custom { color: #fbbf24; background: rgba(251,191,36,0.1); }
    .persona-option-desc {
      margin-top: 3px; color: var(--text-muted); font-size: 11px;
      line-height: 1.4;
    }
    .persona-option-check {
      color: #4acfcf; font-weight: 700; font-size: 14px; margin-top: 1px;
    }
    body[data-theme="light"] .persona-option-check { color: #008b8b; }

    /* Pending autopilot-draft chip on a sidebar row */
    .draft-chip {
      font-size: 10px; line-height: 1; padding: 2px 6px;
      border: 1px solid #4acfcf; color: #4acfcf;
      border-radius: 999px; flex-shrink: 0;
      letter-spacing: 0.04em;
    }
    body[data-theme="light"] .draft-chip { color: #008b8b; border-color: #008b8b; }

    /* Compose-draft dot — subtle signal that the user has unsent text typed */
    .compose-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0;
      opacity: 0.6;
    }

    /* Autopilot toggle pending — shown while /api/autopilot is in flight (probe runs up to 20s) */
    .ap-spinner {
      width: 12px; height: 12px;
      border: 2px solid var(--border);
      border-top-color: #4acfcf;
      border-radius: 50%;
      flex-shrink: 0;
      animation: ap-spin 0.7s linear infinite;
    }
    @keyframes ap-spin { to { transform: rotate(360deg); } }

    /* Autopilot veto card */
    #autopilot-veto-card {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #1a2a3a;
      border: 1px solid #2a5a8a;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      max-width: 520px;
      align-self: flex-start;
    }
    #autopilot-veto-card h4 {
      color: #4acfcf;
      font-size: 13px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #autopilot-veto-countdown {
      font-size: 11px;
      color: var(--text-muted);
    }
    #autopilot-veto-draft {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 12px;
      resize: vertical;
      min-height: 60px;
      margin-bottom: 8px;
      font-family: inherit;
    }
    #autopilot-veto-draft:focus { outline: none; border-color: #4acfcf; }
    .veto-actions { display: flex; gap: 8px; }
    .veto-send { background: #1a4a3a; color: #4acf90; border: 1px solid #4acf90; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .veto-send:hover { background: #2a6a5a; }
    .veto-edit { background: #1a3a4a; color: #4a9eff; border: 1px solid #4a9eff; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .veto-edit:hover { background: #2a5a6a; }
    .veto-cancel { background: #4a1a1a; color: #f44336; border: 1px solid #f44336; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .veto-cancel:hover { background: #6a2a2a; }

    /* Autopilot escalation card — amber colorway to distinguish from the draft */
    .autopilot-escalate-card {
      position: sticky;
      top: 0;
      z-index: 51;
      background: #3a2a12;
      border: 1px solid #8a5a12;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      max-width: 560px;
      align-self: flex-start;
    }
    .autopilot-escalate-card h4 {
      color: #fbbf24;
      font-size: 13px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .autopilot-escalate-card .esc-reason {
      color: #fcd34d;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .autopilot-escalate-card .esc-question {
      background: rgba(0,0,0,0.3);
      border-left: 3px solid #fbbf24;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text);
      max-height: 240px;
      overflow-y: auto;
      white-space: pre-wrap;
      border-radius: 0 6px 6px 0;
      margin-bottom: 8px;
    }
    .autopilot-escalate-card .esc-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .autopilot-escalate-card .esc-actions button {
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid;
      background: transparent;
    }
    .autopilot-escalate-card .esc-proceed { color: #fbbf24; border-color: #fbbf24; }
    .autopilot-escalate-card .esc-proceed:hover { background: rgba(251,191,36,0.12); }
    .autopilot-escalate-card .esc-answer { color: #4a9eff; border-color: #4a9eff; }
    .autopilot-escalate-card .esc-answer:hover { background: rgba(74,158,255,0.12); }
    .autopilot-escalate-card .esc-dismiss { color: var(--text-muted); border-color: var(--border); }
    .autopilot-escalate-card .esc-dismiss:hover { background: rgba(255,255,255,0.05); }
    .autopilot-escalate-card textarea.esc-reply-input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 12px;
      resize: vertical;
      min-height: 60px;
      margin: 8px 0;
      font-family: inherit;
    }
    .autopilot-escalate-card textarea.esc-reply-input:focus { outline: none; border-color: #4a9eff; }
    body[data-theme="light"] .autopilot-escalate-card { background: #fef3c7; border-color: #d97706; }
    body[data-theme="light"] .autopilot-escalate-card h4 { color: #92400e; }
    body[data-theme="light"] .autopilot-escalate-card .esc-reason { color: #78350f; }
    body[data-theme="light"] .autopilot-escalate-card .esc-question { background: rgba(0,0,0,0.06); border-left-color: #d97706; }

    /* Mobile */
    @media (max-width: 768px) {
      #sidebar {
        width: 56px;
        min-width: 56px;
      }
      #sidebar-header { padding: 10px 6px; justify-content: center; flex-wrap: wrap; gap: 4px; }
      #hub-title { display: none; }
      #theme-btn { display: none; }
      #sidebar-footer { padding: 6px; justify-content: center; }
      #sidebar-footer #footer-user { display: none; }
      .group-header { display: none; }
      .session-name { display: none; }
      .session-item { justify-content: center; padding: 12px 4px; gap: 4px; }
      .session-item.teammate { padding-left: 4px; }
      .badge { display: none; }
      .kebab-btn { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="drop-overlay">Drop file to upload</div>

  <div id="login-screen" style="display:none; position:fixed; inset:0; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; gap:24px; z-index:200;">
    <div style="font-size:24px; font-weight:700; color:var(--accent);">Claude Code Hub</div>
    <div style="color:var(--text-muted); font-size:14px;">Sign in with Telegram to continue</div>
    <div id="telegram-widget-container"></div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">
      <span id="hub-title">Claude Code Hub</span>
      <button id="spawn-btn" class="icon-btn primary" title="Spawn a new session" onclick="promptSpawn()">+</button>
      <button id="settings-btn" class="icon-btn" title="Autopilot personalities" onclick="openPersonalitiesPanel()">P</button>
      <button id="theme-btn" class="icon-btn" title="Cycle theme (dark)" onclick="cycleTheme()">🎨</button>
    </div>
    <div id="session-list"></div>
    <div id="sidebar-footer">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="footer-user">signed in</span>
      <button onclick="logout()" title="Sign out">Logout</button>
    </div>
  </div>

  <div id="main">
    <div id="header">
      <span id="session-title" style="color: var(--text-muted)">No session selected</span>
      <span id="trust-badge" class="trust-badge" style="display:none"></span>
      <button id="peek-btn" style="display:none; margin-left:auto; font-size:11px; color:var(--text-muted); background:rgba(0,0,0,0.3); padding:3px 8px; border-radius:4px; cursor:pointer; border:none;" title="Capture the live tmux pane" onclick="openPeekModal()">📺 Peek tmux</button>
      <code id="tmux-cmd" style="display:none; margin-left:8px; font-size:11px; color:var(--text-muted); background:rgba(0,0,0,0.3); padding:3px 8px; border-radius:4px; cursor:pointer;" title="Click to copy" onclick="copyTmuxCmd()"></code>
    </div>
    <div id="peek-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;" onclick="if(event.target.id==='peek-modal') closePeekModal()">
      <div style="background:var(--bg); border:1px solid var(--border); border-radius:8px; max-width:min(900px, 92vw); max-height:80vh; width:100%; display:flex; flex-direction:column;">
        <div style="display:flex; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border);">
          <span id="peek-title" style="font-weight:600;">tmux pane</span>
          <button onclick="refreshPeek()" style="margin-left:auto; font-size:12px; background:rgba(0,0,0,0.3); color:var(--text); border:none; padding:4px 10px; border-radius:4px; cursor:pointer;" title="Re-capture">↻ Refresh</button>
          <button onclick="closePeekModal()" style="margin-left:6px; font-size:14px; background:transparent; color:var(--text-muted); border:none; padding:4px 10px; cursor:pointer;">✕</button>
        </div>
        <pre id="peek-content" style="margin:0; padding:14px; overflow:auto; font-family:ui-monospace, SFMono-Regular, monospace; font-size:12px; line-height:1.4; white-space:pre; color:var(--text); flex:1;">Loading…</pre>
      </div>
    </div>
    <div id="messages">
      <div id="no-session" style="color: var(--text-muted); margin: auto; opacity: 0.5;">Select a session to start chatting</div>
    </div>
    <div id="compose-area" style="display:none;">
      <div id="prompt-tags" style="border-top:1px solid var(--border);padding:6px 16px;display:flex;flex-wrap:wrap;gap:6px;background:var(--input-bg);"></div>
      <div id="attached-files" style="padding:0 16px;display:none;flex-wrap:wrap;gap:6px;background:var(--input-bg);"></div>
      <div id="input-area">
        <label style="cursor:pointer;display:flex;align-items:center;color:var(--text-muted);font-size:18px;padding:0 4px;" title="Attach file">
          <input type="file" id="file-input" multiple style="display:none;" onchange="handleFileSelect(this)" />
          📎
        </label>
        <textarea id="msg-input" placeholder="Type a message..." rows="1"
          onkeydown="handleKey(event)" oninput="onComposeInput(this)"></textarea>
        <button id="send-btn" onclick="sendMsg()">Send</button>
      </div>
    </div>
  </div>

  <script>
    // Themes — cycle via the 🎨 button in the sidebar header; persists in localStorage
    const THEMES = ['dark', 'light', 'blue', 'smooth', 'solarized']
    function applyTheme(name) {
      if (!THEMES.includes(name)) name = 'dark'
      if (name === 'dark') {
        document.body.removeAttribute('data-theme')
      } else {
        document.body.setAttribute('data-theme', name)
      }
      const btn = document.getElementById('theme-btn')
      if (btn) btn.title = `Cycle theme (${name})`
      localStorage.setItem('hub_theme', name)
    }
    function cycleTheme() {
      const cur = localStorage.getItem('hub_theme') || 'dark'
      const next = THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length]
      applyTheme(next)
    }
    // Apply saved theme immediately so first paint matches
    applyTheme(localStorage.getItem('hub_theme') || 'dark')

    // Prompt tags — toggleable instructions appended to messages
    const defaultTags = [
      { id: 'superpowers', label: 'Use Superpowers Skills', text: 'use superpowers skills', active: false },
      { id: 'tdd', label: 'TDD', text: 'follow TDD workflow', active: false },
      { id: 'concise', label: 'Be Concise', text: 'be concise and direct', active: false },
      { id: 'nocommit', label: 'No Commit', text: 'do not commit changes', active: false },
      { id: 'planfirst', label: 'Plan First', text: 'create a plan before implementing', active: false },
      { id: 'review', label: 'Review Code', text: 'review the code for issues', active: false },
    ]

    function loadTags() {
      const saved = localStorage.getItem('hub_tags')
      if (saved) {
        try {
          const states = JSON.parse(saved)
          for (const tag of defaultTags) {
            if (states[tag.id] !== undefined) tag.active = states[tag.id]
          }
        } catch {}
      }
    }

    function saveTags() {
      const states = {}
      for (const tag of defaultTags) states[tag.id] = tag.active
      localStorage.setItem('hub_tags', JSON.stringify(states))
    }

    function renderTags() {
      const container = document.getElementById('prompt-tags')
      container.innerHTML = ''
      for (const tag of defaultTags) {
        const el = document.createElement('button')
        el.textContent = tag.label
        el.style.cssText = `
          padding:3px 10px; border-radius:12px; font-size:11px; cursor:pointer; transition:all 0.15s;
          border:1px solid ${tag.active ? 'var(--accent)' : 'var(--border)'};
          background:${tag.active ? 'rgba(233,69,96,0.15)' : 'transparent'};
          color:${tag.active ? 'var(--accent)' : 'var(--text-muted)'};
        `
        el.onclick = () => {
          tag.active = !tag.active
          saveTags()
          renderTags()
        }
        container.appendChild(el)
      }
    }

    function getActiveTagsText() {
      const active = defaultTags.filter(t => t.active).map(t => t.text)
      return active.length > 0 ? '\n\n[Instructions: ' + active.join(', ') + ']' : ''
    }

    loadTags()
    renderTags()

    // State
    let ws = null
    let activeSession = null
    let sessions = []
    let messagesBySession = {}
    let unreadBySession = {}
    let currentTasks = {} // folder path → AgentTask[]
    let pendingAutopilot = new Set() // session names with an in-flight /api/autopilot toggle
    // Per-session compose textarea drafts. When the user types into the input
    // for session A and switches to session B, A's text would otherwise be
    // lost (the textarea is shared). On selectSession we save the leaving
    // session's text and restore the entering session's text.
    let composeDraftsBySession = {}
    // Pending autopilot drafts, keyed by session name. The veto card lives in
    // the messages area and gets repainted when the user switches sessions —
    // so we keep the source-of-truth here and re-render the card whenever
    // selectSession lands on a session with a pending draft. Cleared when
    // /api/autopilot/veto resolves the draft (any action) or its 30s timer
    // expires server-side.
    let pendingDrafts = {}

    // Escape HTML for XSS prevention
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
    }

    // Markdown → sanitized HTML for chat bubbles. Falls back to escaped
    // text + <br> if the CDN libs failed to load (offline / blocked).
    function renderMarkdown(text) {
      if (!text) return ''
      try {
        if (window.marked && window.DOMPurify) {
          const html = window.marked.parse(text, {
            breaks: true,    // single \n → <br> (matches chat expectations)
            gfm: true,       // tables, autolinks, strikethrough
          })
          return window.DOMPurify.sanitize(html, { ADD_ATTR: ['target', 'rel'] })
        }
      } catch (err) {
        console.warn('markdown render failed, falling back to plaintext', err)
      }
      return escapeHtml(text).replace(/\n/g, '<br>')
    }

    // WebSocket
    function connectWs() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:'
      ws = new WebSocket(`${protocol}//${location.host}/ws`)

      ws.onopen = () => {
        console.log('WS connected')
      }

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data)
          handleWsMessage(msg)
        } catch (e) {
          console.error('WS parse error', e)
        }
      }

      ws.onclose = () => {
        console.log('WS closed, reconnecting...')
        setTimeout(connectWs, 2000)
      }

      ws.onerror = (err) => {
        console.error('WS error', err)
      }
    }

    function handleWsMessage(msg) {
      if (msg.type === 'sessions') {
        sessions = msg.data
        renderSidebar()
      } else if (msg.type === 'message') {
        const { sessionName, text, files } = msg
        if (!messagesBySession[sessionName]) messagesBySession[sessionName] = []
        messagesBySession[sessionName].push({ role: 'claude', text, files, ts: Date.now() })

        if (sessionName === activeSession) {
          appendMessage({ role: 'claude', text, files }, false)
        } else {
          // Badge + append with tag
          unreadBySession[sessionName] = (unreadBySession[sessionName] || 0) + 1
          renderSidebar()
          if (activeSession) {
            appendMessage({ role: 'claude', text, files, fromSession: sessionName }, true)
          }
        }
      } else if (msg.type === 'permission') {
        showPermissionCard(msg)
      } else if (msg.type === 'tasks') {
        currentTasks = msg.data
        renderSidebar()
      } else if (msg.type === 'autopilot:draft') {
        // Track the draft per-session. Re-rendered in selectSession so the
        // user can still find / act on it after switching projects.
        pendingDrafts[msg.sessionName] = msg
        if (msg.sessionName === activeSession) {
          showAutopilotVetoCard(msg)
        } else {
          // Not the active view — sidebar chip surfaces it.
          renderSidebar()
        }
      } else if (msg.type === 'autopilot:escalate') {
        showAutopilotEscalationCard(msg)
      }
    }

    // Autopilot escalation card — appears when autopilot bounces a question
    // (risk keyword / ESCALATE token / timeout / parse error). Offers three
    // one-click actions so the user doesn't have to scroll to find Claude's
    // question or retype anything.
    function showAutopilotEscalationCard(msg) {
      // Remove any existing card for this session (one at a time per session)
      document.querySelectorAll('.autopilot-escalate-card[data-name="' + CSS.escape(msg.sessionName) + '"]').forEach(el => el.remove())

      const area = document.getElementById('messages')
      const card = document.createElement('div')
      card.className = 'autopilot-escalate-card'
      card.dataset.name = msg.sessionName
      card.onclick = (e) => e.stopPropagation()

      const canProceed = msg.reasonKind === 'risk'  // "proceed anyway" only meaningful for risk escalations
      const proceedBtn = canProceed
        ? `<button class="esc-proceed" data-action="proceed">⚡ Let autopilot answer anyway</button>`
        : `<button class="esc-proceed" data-action="retry">🔄 Retry autopilot</button>`

      card.innerHTML = `
        <h4>🟡 Autopilot bounced — <span style="font-weight:400">${escapeHtml(msg.sessionName)}</span></h4>
        <div class="esc-reason">${escapeHtml(msg.reason)}</div>
        <div class="esc-question">${escapeHtml(msg.rawQuestion)}</div>
        <div class="esc-actions">
          ${proceedBtn}
          <button class="esc-answer" data-action="answer-toggle">✍️ I'll answer</button>
          <button class="esc-dismiss" data-action="dismiss">❌ Dismiss</button>
        </div>
        <div class="esc-reply" style="display:none;">
          <textarea class="esc-reply-input" placeholder="Type your answer..."></textarea>
          <div class="esc-actions">
            <button class="esc-answer" data-action="answer-send">Send</button>
            <button class="esc-dismiss" data-action="answer-cancel">Cancel</button>
          </div>
        </div>
      `

      card.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', async (ev) => {
          ev.stopPropagation()
          const action = btn.dataset.action
          if (action === 'answer-toggle') {
            const reply = card.querySelector('.esc-reply')
            reply.style.display = ''
            reply.querySelector('textarea').focus()
            return
          }
          if (action === 'answer-cancel') {
            const reply = card.querySelector('.esc-reply')
            reply.style.display = 'none'
            reply.querySelector('textarea').value = ''
            return
          }
          if (action === 'answer-send') {
            const txt = card.querySelector('textarea').value.trim()
            if (!txt) return
            await fetch('/api/autopilot/escalate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: msg.sessionName, action: 'answer', text: txt }),
            })
            card.remove()
            return
          }
          if (action === 'dismiss') {
            await fetch('/api/autopilot/escalate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: msg.sessionName, action: 'dismiss' }),
            })
            card.remove()
            return
          }
          if (action === 'proceed' || action === 'retry') {
            await fetch('/api/autopilot/escalate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: msg.sessionName, action: 'proceed' }),
            })
            card.remove()
            return
          }
        })
      })

      area.insertBefore(card, area.firstChild)
    }

    // Autopilot veto card state
    let _vetoTimer = null
    let _vetoData = null

    function showAutopilotVetoCard(msg) {
      // Remove any existing card
      dismissVetoCard()

      _vetoData = msg

      const area = document.getElementById('messages')
      const card = document.createElement('div')
      card.id = 'autopilot-veto-card'

      const secondsLeft = () => Math.max(0, Math.round((msg.expiresAt - Date.now()) / 1000))

      card.innerHTML = `
        <h4>🤖 Autopilot draft — <span style="font-weight:400">${escapeHtml(msg.sessionName)}</span>
          <span id="autopilot-veto-countdown" style="font-size:11px;color:var(--text-muted);margin-left:auto;">(${secondsLeft()}s)</span>
        </h4>
        <textarea id="autopilot-veto-draft">${escapeHtml(msg.draft)}</textarea>
        <input id="autopilot-veto-reason" type="text" placeholder="Optional: why are you editing or cancelling? (helps tune this personality)"
          style="margin-top:6px;width:100%;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 8px;font:inherit;">
        <div class="veto-actions">
          <button class="veto-send" onclick="submitVeto('${escapeHtml(msg.sessionName)}','send')">✅ Send</button>
          <button class="veto-edit" onclick="submitVeto('${escapeHtml(msg.sessionName)}','edit')">✏️ Edit &amp; send</button>
          <button class="veto-cancel" onclick="submitVeto('${escapeHtml(msg.sessionName)}','cancel')">❌ Cancel</button>
        </div>
      `

      area.insertBefore(card, area.firstChild)

      // Countdown ticker
      _vetoTimer = setInterval(() => {
        const s = secondsLeft()
        const el = document.getElementById('autopilot-veto-countdown')
        if (el) el.textContent = `(${s}s)`
        if (s <= 0) {
          // Server already fired; just clean up the card
          dismissVetoCard()
        }
      }, 1000)
    }

    function dismissVetoCard() {
      if (_vetoTimer) { clearInterval(_vetoTimer); _vetoTimer = null }
      _vetoData = null
      const existing = document.getElementById('autopilot-veto-card')
      if (existing) existing.remove()
    }

    async function submitVeto(sessionName, action) {
      const textarea = document.getElementById('autopilot-veto-draft')
      const reasonInput = document.getElementById('autopilot-veto-reason')
      const edited = textarea ? textarea.value : ''
      const reason = reasonInput ? reasonInput.value.trim() : ''
      dismissVetoCard()
      // Clear the pending-draft state for this session and refresh the
      // sidebar chip — the user has resolved this draft, no need to show
      // an indicator anymore.
      delete pendingDrafts[sessionName]
      renderSidebar()
      try {
        await fetch('/api/autopilot/veto', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: sessionName, action, edited, reason }),
        })
      } catch (err) {
        console.error('Veto action failed', err)
      }
    }

    // Sidebar — clean row layout, all per-session actions behind a kebab menu
    function renderSidebar() {
      const list = document.getElementById('session-list')
      list.innerHTML = ''

      // Group sessions by folder path (strip :index suffix)
      const groups = new Map()
      for (const s of sessions) {
        const folder = s.path ? s.path.replace(/:\d+$/, '') : s.name
        if (!groups.has(folder)) groups.set(folder, [])
        groups.get(folder).push(s)
      }

      for (const [folder, members] of groups) {
        members.sort((a, b) => (a.teamIndex ?? 0) - (b.teamIndex ?? 0))
        const isTeam = members.length > 1

        // Group header — show the folder name above each group so users can
        // scan at a glance. Use the basename for brevity; full path in title.
        const groupHeader = document.createElement('div')
        groupHeader.className = 'group-header'
        groupHeader.title = folder
        const short = folder.split('/').filter(Boolean).pop() || folder
        groupHeader.textContent = short
        list.appendChild(groupHeader)

        for (const s of members) {
          const isLead = !isTeam || (s.teamIndex ?? 0) === 0
          const item = document.createElement('div')
          item.className = 'session-item' + (s.name === activeSession ? ' active' : '') + (isLead ? '' : ' teammate')
          item.onclick = () => selectSession(s.name)

          const dot = document.createElement('div')
          dot.className = `status-dot ${s.status}`

          const name = document.createElement('div')
          name.className = 'session-name'
          name.textContent = s.name

          item.appendChild(dot)
          item.appendChild(name)

          if (pendingAutopilot.has(s.name)) {
            const spinner = document.createElement('div')
            spinner.className = 'ap-spinner'
            spinner.title = 'Toggling autopilot…'
            item.appendChild(spinner)
          } else if (s.autopilot?.enabled) {
            const apBadge = document.createElement('span')
            apBadge.className = 'ap-badge'
            apBadge.title = 'Autopilot on'
            apBadge.textContent = '🤖'
            item.appendChild(apBadge)
          }

          // Pending autopilot draft chip — appears on whichever session has
          // an unresolved draft inside its veto window. Click the row to
          // jump there; the card is re-rendered by selectSession.
          if (pendingDrafts[s.name] && pendingDrafts[s.name].expiresAt > Date.now()) {
            const chip = document.createElement('span')
            chip.className = 'draft-chip'
            chip.title = 'Autopilot draft pending — click row to review'
            chip.textContent = 'draft'
            item.appendChild(chip)
          }

          // Compose-draft chip — small dot signaling the user has unsent
          // text typed for this session. Subtle — does not displace anything.
          if (composeDraftsBySession[s.name] && s.name !== activeSession) {
            const dot = document.createElement('span')
            dot.className = 'compose-dot'
            dot.title = 'Unsent text in compose box'
            item.appendChild(dot)
          }

          const unread = unreadBySession[s.name]
          if (unread && s.name !== activeSession) {
            const badge = document.createElement('div')
            badge.className = 'badge'
            badge.textContent = unread > 99 ? '99+' : String(unread)
            item.appendChild(badge)
          }

          // Single kebab button — reveals on hover, opens a popover with all
          // per-session actions (trust, autopilot, add teammate, close/restart/remove).
          const kebab = document.createElement('button')
          kebab.className = 'kebab-btn'
          kebab.title = 'Session actions'
          kebab.textContent = '⋮'
          kebab.onclick = (e) => { e.stopPropagation(); openSessionMenu(item, s) }
          item.appendChild(kebab)

          list.appendChild(item)
        }

        const tasks = currentTasks[folder]
        if (tasks && tasks.length > 0) {
          const done = tasks.filter(t => t.status === 'completed').length
          const inProgress = tasks.filter(t => t.status === 'in_progress').length
          const summary = document.createElement('div')
          summary.style.cssText = 'padding:2px 14px 8px 28px;font-size:11px;color:var(--text-muted);'
          summary.textContent = `Tasks: ${done}/${tasks.length} done${inProgress > 0 ? `, ${inProgress} active` : ''}`
          list.appendChild(summary)
        }
      }
    }

    // Kebab popover — creates an inline menu anchored under the session row.
    // Click-outside or Esc closes it.
    let _openKebabRow = null
    function closeSessionMenu() {
      if (_openKebabRow) {
        _openKebabRow.classList.remove('menu-open')
        const existing = _openKebabRow.querySelector('.kebab-menu')
        if (existing) existing.remove()
        _openKebabRow = null
      }
    }
    function openSessionMenu(row, s) {
      if (_openKebabRow === row) { closeSessionMenu(); return }
      closeSessionMenu()
      _openKebabRow = row
      row.classList.add('menu-open')

      const menu = document.createElement('div')
      menu.className = 'kebab-menu'
      menu.onclick = (e) => e.stopPropagation()

      // --- Trust segmented control ---
      const trustLabel = document.createElement('div')
      trustLabel.className = 'kebab-label'
      trustLabel.textContent = 'Trust'
      menu.appendChild(trustLabel)

      const trustRow = document.createElement('div')
      trustRow.className = 'kebab-segmented'
      const currentTrust = s.trust || 'ask'
      for (const level of ['strict', 'ask', 'auto', 'yolo']) {
        const seg = document.createElement('button')
        seg.className = 'kebab-seg'
        seg.textContent = level
        seg.setAttribute('aria-pressed', String(level === currentTrust))
        seg.title = level === 'yolo' ? 'yolo — auto-allow EVERYTHING including destructive ops' :
                   level === 'auto' ? 'auto — allow routine edits/commands; prompt on dangerous' :
                   level === 'ask'  ? 'ask — prompt on anything that writes or runs arbitrary code' :
                                     'strict — prompt on every non-trivial action'
        seg.onclick = async () => {
          try {
            await fetch('/api/trust', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: s.name, level }),
            })
            closeSessionMenu()
          } catch (err) { console.error('Trust change failed', err) }
        }
        trustRow.appendChild(seg)
      }
      menu.appendChild(trustRow)

      // --- Autopilot toggle ---
      const apEnabled = !!(s.autopilot?.enabled)
      const apItem = document.createElement('button')
      apItem.className = 'kebab-item'
      apItem.innerHTML = `<span>🤖</span><span>${apEnabled ? 'Autopilot — ON (click to turn off)' : 'Autopilot — OFF (click to turn on)'}</span>`
      apItem.onclick = async () => {
        closeSessionMenu()
        pendingAutopilot.add(s.name)
        renderSidebar()
        try {
          const res = await fetch('/api/autopilot', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: s.name, enabled: !apEnabled }),
          })
          if (!res.ok) {
            let reason = 'Autopilot toggle failed'
            try { const body = await res.json(); if (body?.reason) reason = body.reason } catch {}
            alert(`${s.name}: ${reason}`)
          }
        } catch (err) {
          console.error('Autopilot toggle failed', err)
          alert(`${s.name}: ${err}`)
        } finally {
          pendingAutopilot.delete(s.name)
          renderSidebar()
        }
      }
      menu.appendChild(apItem)

      // --- Personality submenu ---
      const persoItem = document.createElement('button')
      persoItem.className = 'kebab-item'
      const currentPersoName = s.personalityName ?? 'Default'
      persoItem.innerHTML = `<span>P</span><span>Personality: ${escapeHtml(currentPersoName)} ▸</span>`
      persoItem.onclick = (e) => {
        e.stopPropagation()
        openPersonalityPicker(persoItem, s)
      }
      menu.appendChild(persoItem)

      // --- Decision history ---
      const histItem = document.createElement('button')
      histItem.className = 'kebab-item'
      histItem.innerHTML = '<span>H</span><span>History (autopilot answers)</span>'
      histItem.onclick = () => { openDecisionHistory(s.name); closeSessionMenu() }
      menu.appendChild(histItem)

      // --- Add teammate (lead only) ---
      const isLead = (s.teamIndex ?? 0) === 0
      if (isLead && s.status === 'active') {
        const addTm = document.createElement('button')
        addTm.className = 'kebab-item'
        addTm.innerHTML = '<span>➕</span><span>Add teammate</span>'
        addTm.onclick = () => { addTeammate(s.name); closeSessionMenu() }
        menu.appendChild(addTm)
      }

      menu.appendChild(Object.assign(document.createElement('div'), { className: 'kebab-sep' }))

      // --- Status-dependent actions ---
      if (s.status === 'disconnected') {
        const restart = document.createElement('button')
        restart.className = 'kebab-item'
        restart.innerHTML = '<span>↻</span><span>Restart session</span>'
        restart.onclick = () => { openRestartPopover(s.name, s.path, restart); closeSessionMenu() }
        menu.appendChild(restart)

        const remove = document.createElement('button')
        remove.className = 'kebab-item danger'
        remove.innerHTML = '<span>✕</span><span>Remove from list</span>'
        remove.onclick = () => { removeSession(s.name); closeSessionMenu() }
        menu.appendChild(remove)
      } else {
        const close = document.createElement('button')
        close.className = 'kebab-item danger'
        close.innerHTML = `<span>✕</span><span>${s.managed ? 'Close session' : 'Remove from list (Claude keeps running)'}</span>`
        close.onclick = () => { closeSession(s.name); closeSessionMenu() }
        menu.appendChild(close)
      }

      row.appendChild(menu)
    }

    // Close the kebab menu on outside click or Esc
    document.addEventListener('click', () => closeSessionMenu())
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSessionMenu() })

    // === Autopilot personalities ============================================
    let personalitiesCache = null   // Personality[] | null
    async function loadPersonalities(force) {
      if (personalitiesCache && !force) return personalitiesCache
      const res = await fetch('/api/personalities')
      if (!res.ok) return []
      personalitiesCache = await res.json()
      return personalitiesCache
    }

    async function openPersonalityPicker(_anchorEl, s) {
      const list = await loadPersonalities()
      // Replace any existing picker / kebab menu — only one popover at a time.
      document.querySelectorAll('.persona-picker-modal').forEach((el) => el.remove())
      closeSessionMenu()

      const overlay = document.createElement('div')
      overlay.className = 'modal-overlay persona-picker-modal'
      overlay.innerHTML = '<div class="modal-card persona-picker-card" role="dialog" aria-label="Choose personality"></div>'
      const card = overlay.querySelector('.modal-card')

      const close = () => overlay.remove()
      overlay.onclick = (e) => { if (e.target === overlay) close() }
      const onKey = (e) => {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', onKey) }
      }
      document.addEventListener('keydown', onKey)

      // --- Header ---
      const header = document.createElement('div')
      header.className = 'modal-header'
      header.innerHTML =
        '<div>' +
        '  <div style="font-weight:600;">Personality for <span style="color:#4acfcf;">' + escapeHtml(s.name) + '</span></div>' +
        '  <div style="color:var(--text-muted);font-size:11px;margin-top:2px;">Choose how autopilot speaks for this session</div>' +
        '</div>'
      const closeBtn = document.createElement('button')
      closeBtn.className = 'icon-btn'
      closeBtn.textContent = '×'
      closeBtn.onclick = close
      header.appendChild(closeBtn)
      card.appendChild(header)

      // --- Option renderer ---
      const buildOption = ({ id, name, description, group, active, isNone }) => {
        const opt = document.createElement('button')
        opt.className = 'persona-option' + (active ? ' active' : '')
        opt.setAttribute('aria-pressed', String(active))
        opt.onclick = async () => {
          await assignPersonality(s.name, id)
          close()
        }
        const dot = document.createElement('span')
        dot.className = 'persona-option-dot' + (active ? ' filled' : '')
        opt.appendChild(dot)

        const body = document.createElement('div')
        body.style.cssText = 'flex:1;min-width:0;text-align:left;'
        const title = document.createElement('div')
        title.className = 'persona-option-name'
        title.textContent = name
        if (group === 'builtin') {
          const tag = document.createElement('span')
          tag.className = 'persona-option-tag'
          tag.textContent = 'built-in'
          title.appendChild(tag)
        } else if (group === 'custom') {
          const tag = document.createElement('span')
          tag.className = 'persona-option-tag custom'
          tag.textContent = 'custom'
          title.appendChild(tag)
        }
        body.appendChild(title)

        if (description) {
          const desc = document.createElement('div')
          desc.className = 'persona-option-desc'
          desc.textContent = description
          body.appendChild(desc)
        } else if (isNone) {
          const desc = document.createElement('div')
          desc.className = 'persona-option-desc'
          desc.textContent = 'Use the built-in default constraints (decisive, balanced, escalates on irreversible).'
          body.appendChild(desc)
        }
        opt.appendChild(body)

        if (active) {
          const check = document.createElement('span')
          check.className = 'persona-option-check'
          check.textContent = '✓'
          opt.appendChild(check)
        }
        return opt
      }

      // --- "None" row ---
      const list1 = document.createElement('div')
      list1.className = 'persona-group'
      list1.appendChild(buildOption({
        id: null, name: 'Default',
        active: !s.personalityId,
        isNone: true,
      }))
      card.appendChild(list1)

      // --- Built-in section ---
      const builtins = list.filter((p) => p.builtin)
      if (builtins.length > 0) {
        const heading = document.createElement('div')
        heading.className = 'persona-group-heading'
        heading.textContent = 'Built-in'
        card.appendChild(heading)
        const grp = document.createElement('div')
        grp.className = 'persona-group'
        for (const p of builtins) {
          grp.appendChild(buildOption({
            id: p.id, name: p.name, description: p.description,
            group: 'builtin',
            active: s.personalityId === p.id,
          }))
        }
        card.appendChild(grp)
      }

      // --- Custom section ---
      const customs = list.filter((p) => !p.builtin)
      if (customs.length > 0) {
        const heading = document.createElement('div')
        heading.className = 'persona-group-heading'
        heading.textContent = 'Custom'
        card.appendChild(heading)
        const grp = document.createElement('div')
        grp.className = 'persona-group'
        for (const p of customs) {
          grp.appendChild(buildOption({
            id: p.id, name: p.name, description: p.description,
            group: 'custom',
            active: s.personalityId === p.id,
          }))
        }
        card.appendChild(grp)
      }

      // --- Footer link to the full Personalities panel ---
      const footer = document.createElement('div')
      footer.style.cssText = 'margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;'
      const manage = document.createElement('button')
      manage.className = 'kebab-item'
      manage.style.cssText = 'flex:1;'
      manage.textContent = 'Manage all personalities…'
      manage.onclick = () => { close(); openPersonalitiesPanel() }
      footer.appendChild(manage)
      card.appendChild(footer)

      document.body.appendChild(overlay)
    }

    async function assignPersonality(sessionName, personalityId) {
      try {
        const res = await fetch('/api/sessions/' + encodeURIComponent(sessionName) + '/personality', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ personalityId }),
        })
        if (!res.ok) {
          const txt = await res.text()
          alert(sessionName + ': failed to set personality — ' + txt)
        }
      } catch (err) {
        alert(sessionName + ': ' + err)
      }
    }

    async function openPersonalitiesPanel() {
      const list = await loadPersonalities(true)
      // Modal overlay
      document.querySelectorAll('#personalities-modal').forEach(el => el.remove())
      const overlay = document.createElement('div')
      overlay.id = 'personalities-modal'
      overlay.className = 'modal-overlay'
      overlay.innerHTML = '<div class="modal-card" role="dialog" aria-label="Autopilot personalities"></div>'
      const card = overlay.querySelector('.modal-card')

      const close = () => overlay.remove()
      overlay.onclick = (e) => { if (e.target === overlay) close() }
      document.addEventListener('keydown', function onKey(e) {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', onKey) }
      })

      const header = document.createElement('div')
      header.className = 'modal-header'
      header.innerHTML = '<h3 style="margin:0;">Autopilot personalities</h3>'
      const closeBtn = document.createElement('button')
      closeBtn.className = 'icon-btn'
      closeBtn.textContent = '×'
      closeBtn.onclick = close
      header.appendChild(closeBtn)
      card.appendChild(header)

      const help = document.createElement('p')
      help.style.cssText = 'color:var(--text-muted);font-size:12px;margin:4px 0 12px;'
      help.textContent = 'Built-in personalities cannot be deleted but can be cloned. Each personality replaces the default autopilot constraint block.'
      card.appendChild(help)

      const tbl = document.createElement('div')
      tbl.style.cssText = 'display:flex;flex-direction:column;gap:6px;max-height:50vh;overflow-y:auto;'
      for (const p of list) {
        const row = document.createElement('div')
        row.className = 'persona-row'
        row.innerHTML =
          '<div style="flex:1;min-width:0;">' +
          '  <div style="font-weight:600;">' + escapeHtml(p.name) + (p.builtin ? ' <span style="color:var(--text-muted);font-weight:400;font-size:11px;">built-in</span>' : '') + '</div>' +
          '  <div style="color:var(--text-muted);font-size:11px;">' + escapeHtml(p.description || '') + '</div>' +
          '</div>'
        const acts = document.createElement('div')
        acts.style.cssText = 'display:flex;gap:6px;'
        const editB = document.createElement('button')
        editB.className = 'kebab-item'
        editB.textContent = p.builtin ? 'View' : 'Edit'
        editB.onclick = () => openPersonalityEditor(p, close)
        acts.appendChild(editB)
        const cloneB = document.createElement('button')
        cloneB.className = 'kebab-item'
        cloneB.textContent = 'Clone'
        cloneB.onclick = () => openPersonalityEditor({ ...p, id: undefined, builtin: false, name: p.name + ' (copy)' }, close)
        acts.appendChild(cloneB)
        if (!p.builtin) {
          const delB = document.createElement('button')
          delB.className = 'kebab-item danger'
          delB.textContent = 'Delete'
          delB.onclick = async () => {
            if (!confirm('Delete personality "' + p.name + '"? Sessions using it will fall back to defaults.')) return
            await fetch('/api/personalities/' + p.id, { method: 'DELETE' })
            personalitiesCache = null
            close()
            openPersonalitiesPanel()
          }
          acts.appendChild(delB)
        }
        row.appendChild(acts)
        tbl.appendChild(row)
      }
      card.appendChild(tbl)

      const footer = document.createElement('div')
      footer.style.cssText = 'margin-top:12px;display:flex;justify-content:flex-end;'
      const newB = document.createElement('button')
      newB.className = 'kebab-item primary'
      newB.textContent = '+ New personality'
      newB.onclick = () => openPersonalityEditor({ name: '', systemPrompt: '', description: '' }, close)
      footer.appendChild(newB)
      card.appendChild(footer)

      document.body.appendChild(overlay)
    }

    function openPersonalityEditor(p, parentClose) {
      document.querySelectorAll('#personality-editor').forEach(el => el.remove())
      const overlay = document.createElement('div')
      overlay.id = 'personality-editor'
      overlay.className = 'modal-overlay'
      overlay.innerHTML = '<div class="modal-card" role="dialog"></div>'
      const card = overlay.querySelector('.modal-card')
      const isNew = !p.id
      const isBuiltin = !!p.builtin

      const header = document.createElement('h3')
      header.style.margin = '0 0 12px'
      header.textContent = isNew ? 'New personality' : (isBuiltin ? 'View "' + p.name + '" (built-in, read-only)' : 'Edit "' + p.name + '"')
      card.appendChild(header)

      const fields = document.createElement('div')
      fields.style.cssText = 'display:flex;flex-direction:column;gap:8px;'
      const mkField = (label, key, type) => {
        const wrap = document.createElement('label')
        wrap.style.cssText = 'display:flex;flex-direction:column;gap:2px;font-size:12px;color:var(--text-muted);'
        wrap.textContent = label
        const input = type === 'textarea' ? document.createElement('textarea') : document.createElement('input')
        input.value = p[key] ?? ''
        input.dataset.key = key
        if (type === 'textarea') {
          input.rows = 8
          input.style.cssText = 'font-family:monospace;font-size:12px;'
        }
        if (isBuiltin) input.disabled = true
        wrap.appendChild(input)
        fields.appendChild(wrap)
        return input
      }
      const nameI = mkField('Name', 'name', 'input')
      const descI = mkField('Description (one line)', 'description', 'input')
      const promptI = mkField('System prompt — replaces the default constraint block', 'systemPrompt', 'textarea')
      card.appendChild(fields)

      const footer = document.createElement('div')
      footer.style.cssText = 'margin-top:12px;display:flex;justify-content:flex-end;gap:6px;'
      const cancelB = document.createElement('button')
      cancelB.className = 'kebab-item'
      cancelB.textContent = 'Cancel'
      cancelB.onclick = () => overlay.remove()
      footer.appendChild(cancelB)
      if (!isBuiltin) {
        const saveB = document.createElement('button')
        saveB.className = 'kebab-item primary'
        saveB.textContent = isNew ? 'Create' : 'Save'
        saveB.onclick = async () => {
          const body = { name: nameI.value.trim(), description: descI.value, systemPrompt: promptI.value }
          if (!body.name || !body.systemPrompt) { alert('Name and system prompt are required.'); return }
          const url = isNew ? '/api/personalities' : '/api/personalities/' + p.id
          const method = isNew ? 'POST' : 'PATCH'
          const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
          if (!res.ok) { alert('Save failed: ' + await res.text()); return }
          personalitiesCache = null
          overlay.remove()
          if (parentClose) parentClose()
          openPersonalitiesPanel()
        }
        footer.appendChild(saveB)
      }
      card.appendChild(footer)

      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove() }
      document.body.appendChild(overlay)
    }

    // === Decision history modal ============================================
    async function openDecisionHistory(sessionName) {
      document.querySelectorAll('#decision-history-modal').forEach(el => el.remove())
      const overlay = document.createElement('div')
      overlay.id = 'decision-history-modal'
      overlay.className = 'modal-overlay'
      overlay.innerHTML = '<div class="modal-card" role="dialog" aria-label="Autopilot decision history"></div>'
      const card = overlay.querySelector('.modal-card')

      const close = () => overlay.remove()
      overlay.onclick = (e) => { if (e.target === overlay) close() }
      document.addEventListener('keydown', function onKey(e) {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', onKey) }
      })

      const header = document.createElement('div')
      header.className = 'modal-header'
      header.innerHTML = '<h3 style="margin:0;">Autopilot decisions — ' + escapeHtml(sessionName) + '</h3>'
      const closeBtn = document.createElement('button')
      closeBtn.className = 'icon-btn'
      closeBtn.textContent = '×'
      closeBtn.onclick = close
      header.appendChild(closeBtn)
      card.appendChild(header)

      const status = document.createElement('div')
      status.style.cssText = 'color:var(--text-muted);font-size:12px;margin:6px 0 12px;'
      status.textContent = 'Loading…'
      card.appendChild(status)

      const list = document.createElement('div')
      list.style.cssText = 'display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto;'
      card.appendChild(list)

      document.body.appendChild(overlay)

      let rows = []
      try {
        const res = await fetch('/api/decisions?session=' + encodeURIComponent(sessionName) + '&limit=100')
        if (res.ok) rows = await res.json()
        else { status.textContent = 'Failed: ' + (await res.text()); return }
      } catch (err) {
        status.textContent = 'Failed: ' + err
        return
      }

      if (rows.length === 0) {
        status.textContent = 'No autopilot answers recorded yet for this session.'
        return
      }
      status.textContent = rows.length + ' decision' + (rows.length === 1 ? '' : 's') + ', newest first.'

      for (const r of rows) {
        const item = document.createElement('div')
        item.className = 'persona-row'
        item.style.cssText += ';flex-direction:column;align-items:stretch;cursor:pointer;'
        const when = new Date(r.ts).toLocaleString()
        const persoLabel = r.personalityName ?? 'Default'
        const dur = (r.durationMs / 1000).toFixed(1) + 's'
        const head = document.createElement('div')
        head.style.cssText = 'display:flex;gap:8px;font-size:11px;color:var(--text-muted);'
        head.innerHTML =
          '<span>' + escapeHtml(when) + '</span>' +
          '<span>·</span>' +
          '<span>' + escapeHtml(persoLabel) + '</span>' +
          '<span>·</span>' +
          '<span>' + dur + '</span>'
        item.appendChild(head)

        const q = document.createElement('div')
        q.style.cssText = 'font-size:12px;color:var(--text-muted);margin-top:2px;'
        const qText = (r.rawQuestion || '').replace(/\s+/g, ' ').trim()
        q.textContent = 'Q: ' + (qText.length > 200 ? qText.slice(0, 200) + '…' : qText)
        item.appendChild(q)

        const a = document.createElement('div')
        a.style.cssText = 'font-size:13px;margin-top:4px;'
        const aText = (r.answer || '').trim()
        const collapsed = aText.length > 240
        a.textContent = 'A: ' + (collapsed ? aText.slice(0, 240) + '…' : aText)
        item.appendChild(a)

        if (collapsed) {
          item.title = 'Click to expand'
          item.onclick = () => {
            a.textContent = 'A: ' + aText
            item.style.cursor = 'default'
            item.onclick = null
          }
        }

        // Attached feedback (cancel/edit reasons captured during veto window)
        const fb = Array.isArray(r.feedback) ? r.feedback : []
        if (fb.length > 0) {
          const fbWrap = document.createElement('div')
          fbWrap.style.cssText = 'margin-top:6px;padding-top:6px;border-top:1px dashed var(--border);font-size:12px;'
          for (const entry of fb) {
            const line = document.createElement('div')
            const verb = entry.action === 'cancel' ? 'Cancelled' : 'Edited'
            const when = new Date(entry.ts).toLocaleString()
            const reason = entry.reason ? ' — "' + escapeHtml(entry.reason) + '"' : ''
            line.style.cssText = 'color:var(--text-muted);'
            line.innerHTML = '<strong>' + verb + '</strong> at ' + escapeHtml(when) + reason
            fbWrap.appendChild(line)
            if (entry.action === 'edit' && entry.editedAnswer) {
              const ed = document.createElement('div')
              ed.style.cssText = 'margin-top:2px;padding-left:10px;color:var(--text);'
              ed.textContent = '↳ user wrote: ' + entry.editedAnswer
              fbWrap.appendChild(ed)
            }
          }
          item.appendChild(fbWrap)
        }
        list.appendChild(item)
      }
    }

    async function addTeammate(leadName) {
      try {

          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ leadName })
        })
